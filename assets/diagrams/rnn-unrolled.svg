<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" role="img" aria-labelledby="dg-rnn-unrolled-title dg-rnn-unrolled-desc">
  <title id="dg-rnn-unrolled-title">RNN unrolled through time, with the backpropagation-through-time gradient path</title>
  <desc id="dg-rnn-unrolled-desc">The same recurrent cell and weights are applied at every time step: the hidden state h_t is a function of the current input x_t and the previous hidden state h_{t-1}, so state can in principle carry information across an unbounded history, and every step must run after the previous one (no parallel execution across time). Training with backpropagation through time sends the error gradient backward across every step, repeatedly multiplying by the same recurrent Jacobian; if that Jacobian&#x27;s eigenvalues are consistently below or above one, the product shrinks toward zero (vanishing gradient) or grows without bound (exploding gradient) as the number of steps grows.</desc>
  <defs>
    <marker id="dg-rnn-unrolled-arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1f5fa8"/></marker>
    <marker id="dg-rnn-unrolled-arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#0f7d82"/></marker>
    <marker id="dg-rnn-unrolled-arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7b3fb0"/></marker>
    <marker id="dg-rnn-unrolled-arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#565d6b"/></marker>
    <marker id="dg-rnn-unrolled-arrow-danger" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b3261e"/></marker>
    <marker id="dg-rnn-unrolled-arrow-warn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#9a6400"/></marker>
    <marker id="dg-rnn-unrolled-arrow-success" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1b7a43"/></marker>
    <marker id="dg-rnn-unrolled-arrow-ink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1a1d23"/></marker>
    <marker id="dg-rnn-unrolled-arrow-open" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M1,1 L10,6 L1,11" fill="none" stroke="#565d6b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="dg-rnn-unrolled-arrow-diamond" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M5,0 L10,5 L5,10 L0,5 Z" fill="#7b3fb0"/></marker>
    <pattern id="dg-rnn-unrolled-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#ffffff"/><line x1="0" y1="0" x2="0" y2="6" stroke="#d9dce1" stroke-width="2"/></pattern>
    <pattern id="dg-rnn-unrolled-hatch-danger" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#fbe9e7"/><line x1="0" y1="0" x2="0" y2="6" stroke="#b3261e" stroke-width="1.4"/></pattern>
  </defs>
  <rect x="0" y="0" width="1080" height="480" fill="#ffffff"/>
  <g font-family="Segoe UI, Arial, sans-serif">
  <text x="540" y="30" font-size="19" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">RNN Unrolled Through Time</text>
  <text x="540" y="51" font-size="12.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">Ch. 5 — shared weights across steps; gradients flow backward through the same recurrent path</text>
  <rect x="130" y="340" width="150" height="46" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="205" y="364.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">x_1</text>
  <path d="M205,340 L205,290" fill="none" stroke="#565d6b" stroke-width="1.8"  marker-end="url(#dg-rnn-unrolled-arrow-gray)" stroke-linecap="round"/>
  <rect x="130" y="200" width="150" height="90" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="205" y="238.22" font-size="13.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_1</text><text x="205" y="254.72" font-size="10.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">= f(Wx_t + Uh_{t-1})</text>
  <rect x="130" y="90" width="150" height="46" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="205" y="114.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">y_1</text>
  <path d="M205,200 L205,136" fill="none" stroke="#0f7d82" stroke-width="1.8"  marker-end="url(#dg-rnn-unrolled-arrow-teal)" stroke-linecap="round"/>
  <rect x="370" y="340" width="150" height="46" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="445" y="364.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">x_2</text>
  <path d="M445,340 L445,290" fill="none" stroke="#565d6b" stroke-width="1.8"  marker-end="url(#dg-rnn-unrolled-arrow-gray)" stroke-linecap="round"/>
  <rect x="370" y="200" width="150" height="90" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="445" y="238.22" font-size="13.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_2</text><text x="445" y="254.72" font-size="10.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">= f(Wx_t + Uh_{t-1})</text>
  <rect x="370" y="90" width="150" height="46" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="445" y="114.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">y_2</text>
  <path d="M445,200 L445,136" fill="none" stroke="#0f7d82" stroke-width="1.8"  marker-end="url(#dg-rnn-unrolled-arrow-teal)" stroke-linecap="round"/>
  <path d="M280,245 L370,245" fill="none" stroke="#1f5fa8" stroke-width="2.2"  marker-end="url(#dg-rnn-unrolled-arrow-blue)" stroke-linecap="round"/><rect x="288" y="222" width="74" height="14" fill="#ffffff" opacity="0.9"/><text x="325" y="233" font-size="11.5" text-anchor="middle" font-weight="600" font-style="normal" fill="#565d6b">recurrence</text>
  <rect x="610" y="340" width="150" height="46" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="685" y="364.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">x_3</text>
  <path d="M685,340 L685,290" fill="none" stroke="#565d6b" stroke-width="1.8"  marker-end="url(#dg-rnn-unrolled-arrow-gray)" stroke-linecap="round"/>
  <rect x="610" y="200" width="150" height="90" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="685" y="238.22" font-size="13.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_3</text><text x="685" y="254.72" font-size="10.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">= f(Wx_t + Uh_{t-1})</text>
  <rect x="610" y="90" width="150" height="46" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="685" y="114.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">y_3</text>
  <path d="M685,200 L685,136" fill="none" stroke="#0f7d82" stroke-width="1.8"  marker-end="url(#dg-rnn-unrolled-arrow-teal)" stroke-linecap="round"/>
  <path d="M520,245 L610,245" fill="none" stroke="#1f5fa8" stroke-width="2.2"  marker-end="url(#dg-rnn-unrolled-arrow-blue)" stroke-linecap="round"/>
  <rect x="850" y="340" width="150" height="46" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="925" y="364.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">x_4</text>
  <path d="M925,340 L925,290" fill="none" stroke="#565d6b" stroke-width="1.8"  marker-end="url(#dg-rnn-unrolled-arrow-gray)" stroke-linecap="round"/>
  <rect x="850" y="200" width="150" height="90" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="925" y="238.22" font-size="13.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_4</text><text x="925" y="254.72" font-size="10.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">= f(Wx_t + Uh_{t-1})</text>
  <rect x="850" y="90" width="150" height="46" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="925" y="114.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">y_4</text>
  <path d="M925,200 L925,136" fill="none" stroke="#0f7d82" stroke-width="1.8"  marker-end="url(#dg-rnn-unrolled-arrow-teal)" stroke-linecap="round"/>
  <path d="M760,245 L850,245" fill="none" stroke="#1f5fa8" stroke-width="2.2"  marker-end="url(#dg-rnn-unrolled-arrow-blue)" stroke-linecap="round"/>
  <rect x="20" y="200" width="90" height="90" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="65" y="238.64" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_0</text><text x="65" y="253.64" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">(init)</text>
  <path d="M110,245 L130,245" fill="none" stroke="#1f5fa8" stroke-width="2"  marker-end="url(#dg-rnn-unrolled-arrow-blue)" stroke-linecap="round"/>
  <path d="M1000,60 L130,60" fill="none" stroke="#7b3fb0" stroke-width="2.6" stroke-dasharray="1.6,3.4" marker-end="url(#dg-rnn-unrolled-arrow-diamond)" stroke-linecap="round"/>
  <text x="565" y="42" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#7b3fb0">∂L / ∂h_1 = ∂L/∂h_4 · ∏ (Jacobians)  —  BPTT gradient path</text>
  <text x="565" y="76" font-size="11" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">repeated multiplication → vanishing (→0) or exploding (→∞) gradients</text>
  <rect x="130" y="440" width="870" height="0" rx="8" fill="none" stroke="none" stroke-width="1.8"/>
  <text x="130" y="460" font-size="11.5" text-anchor="start" font-weight="400" font-style="normal" fill="#565d6b">Each h_t depends on h_{t-1}, so steps cannot be computed in parallel across time — a sequential-compute limitation later removed by attention.</text>
  <rect x="30" y="130" width="250" height="92" rx="8" fill="#ffffff" stroke="#9aa2b1" stroke-width="1.3"/>
<text x="44" y="150" font-size="12.5" text-anchor="start" font-weight="700" font-style="normal" fill="#1a1d23">Legend</text>
<path d="M44,166 L78,166" fill="none" stroke="#1f5fa8" stroke-width="2.0"  marker-end="url(#dg-rnn-unrolled-arrow-blue)" stroke-linecap="round"/>
<text x="86" y="170" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">recurrent state update</text>
<path d="M44,186 L78,186" fill="none" stroke="#0f7d82" stroke-width="2.0"  marker-end="url(#dg-rnn-unrolled-arrow-teal)" stroke-linecap="round"/>
<text x="86" y="190" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">output projection</text>
<path d="M44,206 L78,206" fill="none" stroke="#7b3fb0" stroke-width="2.0" stroke-dasharray="1.6,3.4" marker-end="url(#dg-rnn-unrolled-arrow-diamond)" stroke-linecap="round"/>
<text x="86" y="210" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">backward gradient (BPTT)</text>
  </g>
</svg>
