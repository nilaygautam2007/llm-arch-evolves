<path d="M44,656 L78,656" fill="none" stroke="#7b3fb0" stroke-width="2.0" stroke-dasharray="1.6,3.4" marker-end="url(#dg-lstm-gru-arrow-diamond)" stroke-linecap="round"/>
<text x="86" y="660" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">gate value controlling ⊗/⊕</text>
