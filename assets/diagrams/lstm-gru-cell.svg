<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" role="img" aria-labelledby="dg-lstm-gru-title dg-lstm-gru-desc">
  <title id="dg-lstm-gru-title">LSTM and GRU recurrent cells compared</title>
  <desc id="dg-lstm-gru-desc">Both cells replace the plain RNN&#x27;s single tanh update with learned gates so that gradients can flow with much less repeated shrinking or growing. The LSTM keeps a separate cell state c that flows along a near-additive highway: a forget gate decides how much of the old cell state to keep, an input gate decides how much new candidate information to add, and this sum becomes the new cell state with only elementwise multiplication and addition on the highway itself, which is the constant error carousel; a separate output gate then filters the cell state into the hidden state. The GRU consolidates this into a single hidden state with two gates: an update gate blends the previous hidden state with a new candidate, and a reset gate controls how much of the previous hidden state is used when forming that candidate.</desc>
  <defs>
    <marker id="dg-lstm-gru-arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1f5fa8"/></marker>
    <marker id="dg-lstm-gru-arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#0f7d82"/></marker>
    <marker id="dg-lstm-gru-arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7b3fb0"/></marker>
    <marker id="dg-lstm-gru-arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#565d6b"/></marker>
    <marker id="dg-lstm-gru-arrow-danger" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b3261e"/></marker>
    <marker id="dg-lstm-gru-arrow-warn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#9a6400"/></marker>
    <marker id="dg-lstm-gru-arrow-success" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1b7a43"/></marker>
    <marker id="dg-lstm-gru-arrow-ink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1a1d23"/></marker>
    <marker id="dg-lstm-gru-arrow-open" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M1,1 L10,6 L1,11" fill="none" stroke="#565d6b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="dg-lstm-gru-arrow-diamond" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M5,0 L10,5 L5,10 L0,5 Z" fill="#7b3fb0"/></marker>
    <pattern id="dg-lstm-gru-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#ffffff"/><line x1="0" y1="0" x2="0" y2="6" stroke="#d9dce1" stroke-width="2"/></pattern>
    <pattern id="dg-lstm-gru-hatch-danger" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#fbe9e7"/><line x1="0" y1="0" x2="0" y2="6" stroke="#b3261e" stroke-width="1.4"/></pattern>
  </defs>
  <rect x="0" y="0" width="1100" height="660" fill="#ffffff"/>
  <g font-family="Segoe UI, Arial, sans-serif">
  <text x="550" y="30" font-size="19" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">LSTM and GRU Cells</text>
  <text x="550" y="51" font-size="12.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">Ch. 6 — gated, near-additive state paths mitigate vanishing gradients</text>
  <line x1="550" y1="75" x2="550" y2="600" stroke="#d9dce1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="275" y="85" font-size="15" text-anchor="middle" font-weight="700" font-style="normal" fill="#1f5fa8">LSTM</text>
  <rect x="40" y="100" width="100" height="44" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="90" y="123.25" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_{t-1}</text>
  <rect x="170" y="100" width="100" height="44" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="220" y="123.25" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">x_t</text>
  <rect x="80" y="168" width="190" height="40" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="175" y="189.03" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">concat[h_{t-1}, x_t]</text>
  <path d="M90,144 L140,168" fill="none" stroke="#565d6b" stroke-width="1.5"  marker-end="url(#dg-lstm-gru-arrow-gray)" stroke-linecap="round"/>
  <path d="M220,144 L210,168" fill="none" stroke="#565d6b" stroke-width="1.5"  marker-end="url(#dg-lstm-gru-arrow-gray)" stroke-linecap="round"/>
  <rect x="30" y="245" width="118" height="56" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="89" y="266.78" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">forget gate</text><text x="89" y="281.28" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">f_t = σ(W_f·[h,x])</text>
  <path d="M175,208 L89,245" fill="none" stroke="#565d6b" stroke-width="1.3"  marker-end="url(#dg-lstm-gru-arrow-gray)" stroke-linecap="round"/>
  <rect x="156" y="245" width="118" height="56" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="215" y="266.78" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">input gate</text><text x="215" y="281.28" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">i_t = σ(W_i·[h,x])</text>
  <path d="M175,208 L215,245" fill="none" stroke="#565d6b" stroke-width="1.3"  marker-end="url(#dg-lstm-gru-arrow-gray)" stroke-linecap="round"/>
