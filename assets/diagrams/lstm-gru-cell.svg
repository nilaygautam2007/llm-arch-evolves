  <text x="288.5" y="411" font-size="10.3" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">cell-state highway: only ⊗ / ⊕ on this path — near-additive gradient flow (CEC)</text>
  <rect x="473" y="437" width="68" height="32" rx="6" fill="#ffffff" stroke="#1a1d23" stroke-width="1.6"/>
  <text x="507" y="458" font-size="11" text-anchor="middle" font-weight="600" font-style="normal" fill="#1a1d23">tanh(c_t)</text>
  <path d="M537,385 L537,437" fill="none" stroke="#1f5fa8" stroke-width="1.5" stroke-dasharray="1.6,3.4" marker-end="url(#dg-lstm-gru-arrow-diamond)" stroke-linecap="round"/>
  <circle cx="507" cy="499" r="14" fill="#ffffff" stroke="#1a1d23" stroke-width="1.8"/><text x="507" y="504" font-size="15" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">⊗</text>
  <path d="M507,469 L507,485" fill="none" stroke="#1a1d23" stroke-width="1.6"  marker-end="url(#dg-lstm-gru-arrow-ink)" stroke-linecap="round"/>
  <path d="M467,301 L521,487" fill="none" stroke="#1f5fa8" stroke-width="1.6" stroke-dasharray="1.6,3.4" marker-end="url(#dg-lstm-gru-arrow-diamond)" stroke-linecap="round"/>
  <rect x="452" y="523" width="110" height="40" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="507" y="544.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_t</text>
  <path d="M507,513 L507,523" fill="none" stroke="#1a1d23" stroke-width="1.8"  marker-end="url(#dg-lstm-gru-arrow-ink)" stroke-linecap="round"/>
  <text x="825" y="85" font-size="15" text-anchor="middle" font-weight="700" font-style="normal" fill="#0f7d82">GRU</text>
  <rect x="610" y="100" width="100" height="44" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="660" y="123.25" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_{t-1}</text>
  <rect x="740" y="100" width="100" height="44" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="790" y="123.25" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">x_t</text>
  <rect x="650" y="168" width="190" height="40" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="745" y="189.03" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">concat[h_{t-1}, x_t]</text>
  <path d="M660,144 L710,168" fill="none" stroke="#565d6b" stroke-width="1.5"  marker-end="url(#dg-lstm-gru-arrow-gray)" stroke-linecap="round"/>
  <path d="M790,144 L780,168" fill="none" stroke="#565d6b" stroke-width="1.5"  marker-end="url(#dg-lstm-gru-arrow-gray)" stroke-linecap="round"/>
  <rect x="605" y="245" width="165" height="56" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="687.5" y="266.78" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">reset gate</text><text x="687.5" y="281.28" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">r_t = σ(W_r·[h,x])</text>
  <path d="M745,208 L687.5,245" fill="none" stroke="#565d6b" stroke-width="1.3"  marker-end="url(#dg-lstm-gru-arrow-gray)" stroke-linecap="round"/>
  <rect x="810" y="245" width="165" height="56" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="892.5" y="266.78" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">update gate</text><text x="892.5" y="281.28" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">z_t = σ(W_z·[h,x])</text>
  <path d="M745,208 L892.5,245" fill="none" stroke="#565d6b" stroke-width="1.3"  marker-end="url(#dg-lstm-gru-arrow-gray)" stroke-linecap="round"/>
  <circle cx="687.5" cy="340" r="14" fill="#ffffff" stroke="#1a1d23" stroke-width="1.8"/><text x="687.5" y="345" font-size="15" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">⊗</text>
  <path d="M687.5,301 L687.5,326" fill="none" stroke="#0f7d82" stroke-width="1.6" stroke-dasharray="1.6,3.4" marker-end="url(#dg-lstm-gru-arrow-diamond)" stroke-linecap="round"/>
  <text x="625.5" y="344" font-size="10" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">h_{t-1}</text>
  <rect x="700" y="370" width="200" height="50" rx="8" fill="#f2e9f8" stroke="#7b3fb0" stroke-width="1.8"/><text x="800" y="388.78" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">candidate</text><text x="800" y="403.28" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">h̃_t = tanh(W·[r_t⊙h_{t-1}, x_t])</text>
  <path d="M687.5,354 L740,370" fill="none" stroke="#7b3fb0" stroke-width="1.5"  marker-end="url(#dg-lstm-gru-arrow-purple)" stroke-linecap="round"/>
  <text x="790" y="436" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_t = (1 − z_t)⊙h_{t-1} + z_t⊙h̃_t</text>
  <circle cx="790" cy="470" r="15" fill="#ffffff" stroke="#1a1d23" stroke-width="1.8"/><text x="790" y="475" font-size="15" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">⊕</text>
  <path d="M892.5,301 L805,458" fill="none" stroke="#1f5fa8" stroke-width="1.6" stroke-dasharray="1.6,3.4" marker-end="url(#dg-lstm-gru-arrow-diamond)" stroke-linecap="round"/>
  <path d="M800,420 L790,455" fill="none" stroke="#7b3fb0" stroke-width="1.6"  marker-end="url(#dg-lstm-gru-arrow-purple)" stroke-linecap="round"/>
  <rect x="735" y="500" width="110" height="40" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="790" y="521.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_t</text>
  <path d="M790,485 L790,500" fill="none" stroke="#1a1d23" stroke-width="1.8"  marker-end="url(#dg-lstm-gru-arrow-ink)" stroke-linecap="round"/>
  <text x="605" y="570" font-size="10.8" text-anchor="start" font-weight="400" font-style="normal" fill="#565d6b">No separate cell state — update/reset gates merge memory and output into one hidden state.</text>
