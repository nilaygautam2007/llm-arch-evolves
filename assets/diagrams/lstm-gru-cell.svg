  <path d="M175,208 L341,245" fill="none" stroke="#565d6b" stroke-width="1.3"  marker-end="url(#dg-lstm-gru-arrow-gray)" stroke-linecap="round"/>
  <rect x="408" y="245" width="118" height="56" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="467" y="266.78" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">output gate</text><text x="467" y="281.28" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">o_t = σ(W_o·[h,x])</text>
  <path d="M175,208 L467,245" fill="none" stroke="#565d6b" stroke-width="1.3"  marker-end="url(#dg-lstm-gru-arrow-gray)" stroke-linecap="round"/>
  <text x="40" y="363" font-size="12.5" text-anchor="start" font-weight="700" font-style="normal" fill="#1a1d23">c_{t-1}</text>
  <path d="M40,385 L75,385" fill="none" stroke="#1f5fa8" stroke-width="3.2"  marker-end="url(#dg-lstm-gru-arrow-blue)" stroke-linecap="round"/>
  <circle cx="89" cy="385" r="15" fill="#ffffff" stroke="#1a1d23" stroke-width="1.8"/><text x="89" y="390" font-size="15" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">⊗</text>
  <path d="M89,301 L89,370" fill="none" stroke="#1f5fa8" stroke-width="1.6" stroke-dasharray="1.6,3.4" marker-end="url(#dg-lstm-gru-arrow-diamond)" stroke-linecap="round"/>
  <path d="M104,385 L326,385" fill="none" stroke="#1f5fa8" stroke-width="3.2"  marker-end="url(#dg-lstm-gru-arrow-blue)" stroke-linecap="round"/>
  <circle cx="274" cy="300" r="14" fill="#ffffff" stroke="#1a1d23" stroke-width="1.8"/><text x="274" y="305" font-size="15" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">⊗</text>
  <path d="M215,301 L274,286" fill="none" stroke="#0f7d82" stroke-width="1.6" stroke-dasharray="1.6,3.4" marker-end="url(#dg-lstm-gru-arrow-diamond)" stroke-linecap="round"/>
  <path d="M341,301 L274,314" fill="none" stroke="#7b3fb0" stroke-width="1.6" stroke-dasharray="1.6,3.4" marker-end="url(#dg-lstm-gru-arrow-diamond)" stroke-linecap="round"/>
  <circle cx="341" cy="385" r="15" fill="#ffffff" stroke="#1a1d23" stroke-width="1.8"/><text x="341" y="390" font-size="15" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">⊕</text>
  <path d="M274,314 L341,370" fill="none" stroke="#0f7d82" stroke-width="1.6"  marker-end="url(#dg-lstm-gru-arrow-teal)" stroke-linecap="round"/>
