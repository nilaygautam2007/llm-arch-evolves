  <text x="36" y="344" font-size="10.3" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">→ memory per sequence grows linearly with tokens generated so far (new pair per step, highlighted teal)</text>
  <text x="540" y="290" font-size="13.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#7b3fb0">B. PagedAttention: logical blocks → page table → non-contiguous physical pages</text>
