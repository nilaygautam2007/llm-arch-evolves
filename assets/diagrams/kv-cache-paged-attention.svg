<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 640" role="img" aria-labelledby="dg-kv-cache-paged-title dg-kv-cache-paged-desc">
  <title id="dg-kv-cache-paged-title">Growing KV cache during decoding, and PagedAttention memory management</title>
  <desc id="dg-kv-cache-paged-desc">During autoregressive decoding, each new token produces one key and value vector per attention head, which must be kept for every future step so that new queries can attend back over the whole generated-so-far sequence; the cache therefore grows linearly with sequence length even though computing each new token is not itself quadratic. This is a serving-time memory problem, distinct from the quadratic attention score computation seen during training on a fixed context. PagedAttention addresses the memory-management side by splitting the logical KV sequence into fixed-size blocks and mapping those logical blocks to non-contiguous physical memory pages through a per-sequence page table, the same idea operating systems use for virtual memory; this allows near-zero-waste allocation and lets multiple sequences share identical prefix blocks instead of duplicating them.</desc>
  <defs>
    <marker id="dg-kv-cache-paged-arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1f5fa8"/></marker>
    <marker id="dg-kv-cache-paged-arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#0f7d82"/></marker>
    <marker id="dg-kv-cache-paged-arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7b3fb0"/></marker>
    <marker id="dg-kv-cache-paged-arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#565d6b"/></marker>
    <marker id="dg-kv-cache-paged-arrow-danger" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b3261e"/></marker>
    <marker id="dg-kv-cache-paged-arrow-warn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#9a6400"/></marker>
    <marker id="dg-kv-cache-paged-arrow-success" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1b7a43"/></marker>
    <marker id="dg-kv-cache-paged-arrow-ink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1a1d23"/></marker>
    <marker id="dg-kv-cache-paged-arrow-open" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M1,1 L10,6 L1,11" fill="none" stroke="#565d6b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="dg-kv-cache-paged-arrow-diamond" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M5,0 L10,5 L5,10 L0,5 Z" fill="#7b3fb0"/></marker>
    <pattern id="dg-kv-cache-paged-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#ffffff"/><line x1="0" y1="0" x2="0" y2="6" stroke="#d9dce1" stroke-width="2"/></pattern>
    <pattern id="dg-kv-cache-paged-hatch-danger" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#fbe9e7"/><line x1="0" y1="0" x2="0" y2="6" stroke="#b3261e" stroke-width="1.4"/></pattern>
  </defs>
  <rect x="0" y="0" width="1080" height="640" fill="#ffffff"/>
  <g font-family="Segoe UI, Arial, sans-serif">
  <text x="540" y="30" font-size="19" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">KV Cache Growth and PagedAttention</text>
  <text x="540" y="51" font-size="12.3" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">Ch. 15 — linear per-step memory growth (serving) vs. quadratic score computation (training)</text>
