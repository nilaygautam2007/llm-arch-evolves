  <path d="M505,456 C505,470 465,470 465,500" fill="none" stroke="#7b3fb0" stroke-width="1.5" stroke-dasharray="1.6,3.4" marker-end="url(#dg-kv-cache-paged-arrow-diamond)" stroke-linecap="round"/>
  <text x="60" y="576" font-size="10.6" text-anchor="start" font-weight="400" font-style="normal" fill="#565d6b">Non-contiguous allocation avoids reserving worst-case-length memory upfront; identical prefix blocks (e.g. a shared system prompt) map to the same physical page.</text>
