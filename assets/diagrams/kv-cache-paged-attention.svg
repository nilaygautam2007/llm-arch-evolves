  <rect x="450" y="320" width="110" height="46" rx="8" fill="#f2e9f8" stroke="#7b3fb0" stroke-width="1.8"/><text x="505" y="336.64" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">blk 3</text><text x="505" y="351.64" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">4 tokens/block</text>
  <text x="50" y="312" font-size="10.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">logical KV sequence (per request)</text>
  <rect x="60" y="410" width="550" height="46" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.5"/>
  <text x="335" y="438" font-size="11.5" text-anchor="middle" font-weight="600" font-style="normal" fill="#1a1d23">page table (per-sequence): logical block → physical page id</text>
