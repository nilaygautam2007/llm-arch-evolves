  <rect x="190" y="320" width="110" height="46" rx="8" fill="#f2e9f8" stroke="#7b3fb0" stroke-width="1.8"/><text x="245" y="336.64" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">blk 1</text><text x="245" y="351.64" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">4 tokens/block</text>
