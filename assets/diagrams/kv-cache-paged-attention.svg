<path d="M664,76 L698,76" fill="none" stroke="#7b3fb0" stroke-width="2.0" stroke-dasharray="1.6,3.4" marker-end="url(#dg-kv-cache-paged-arrow-diamond)" stroke-linecap="round"/>
<text x="706" y="80" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">page-table lookup (logical → physical)</text>
