  <rect x="400" y="500" width="130" height="50" rx="8" fill="#c9e9e9" stroke="#0f7d82" stroke-width="1.8"/><text x="465" y="518.78" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">physical page 5</text><text x="465" y="533.28" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">shared prefix</text>
