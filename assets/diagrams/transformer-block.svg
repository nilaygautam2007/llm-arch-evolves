<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 900" role="img" aria-labelledby="dg-transformer-block-title dg-transformer-block-desc">
  <title id="dg-transformer-block-title">Modern pre-norm Transformer block with residual stream, RoPE, grouped-query attention, and SwiGLU</title>
  <desc id="dg-transformer-block-desc">Information flows along a residual stream that is only ever added to, never overwritten. At each sub-layer the stream is first normalized (pre-norm, e.g. RMSNorm), then transformed, and the result is added back to the unnormalized stream via a residual bypass, which keeps gradients close to identity through very deep stacks. The attention sub-layer projects the normalized stream into query, key, and value heads; rotary position embeddings (RoPE) rotate the query and key vectors by an angle proportional to position so that their dot product depends on relative distance; grouped-query attention (GQA) uses fewer key/value head groups than query heads, so multiple query heads share one key/value projection to shrink the serving-time KV cache. The feed-forward sub-layer replaces a plain MLP with SwiGLU, a gated linear unit built from the SiLU activation, and its output is again added back into the residual stream.</desc>
  <defs>
    <marker id="dg-transformer-block-arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1f5fa8"/></marker>
    <marker id="dg-transformer-block-arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#0f7d82"/></marker>
    <marker id="dg-transformer-block-arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7b3fb0"/></marker>
    <marker id="dg-transformer-block-arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#565d6b"/></marker>
    <marker id="dg-transformer-block-arrow-danger" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b3261e"/></marker>
    <marker id="dg-transformer-block-arrow-warn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#9a6400"/></marker>
    <marker id="dg-transformer-block-arrow-success" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1b7a43"/></marker>
    <marker id="dg-transformer-block-arrow-ink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1a1d23"/></marker>
    <marker id="dg-transformer-block-arrow-open" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M1,1 L10,6 L1,11" fill="none" stroke="#565d6b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="dg-transformer-block-arrow-diamond" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M5,0 L10,5 L5,10 L0,5 Z" fill="#7b3fb0"/></marker>
    <pattern id="dg-transformer-block-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#ffffff"/><line x1="0" y1="0" x2="0" y2="6" stroke="#d9dce1" stroke-width="2"/></pattern>
    <pattern id="dg-transformer-block-hatch-danger" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#fbe9e7"/><line x1="0" y1="0" x2="0" y2="6" stroke="#b3261e" stroke-width="1.4"/></pattern>
  </defs>
  <rect x="0" y="0" width="1040" height="900" fill="#ffffff"/>
  <g font-family="Segoe UI, Arial, sans-serif">
  <text x="520" y="30" font-size="19" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Transformer Block (pre-norm)</text>
  <text x="520" y="51" font-size="12.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">Ch. 9 + Ch. 13 modern defaults — residual stream, RoPE, GQA, SwiGLU</text>
  <text x="310" y="78" font-size="11" text-anchor="start" font-weight="normal" font-style="italic" fill="#565d6b">residual stream (added to, never overwritten)</text>
  <rect x="430" y="100" width="180" height="40" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="520" y="121.25" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">x  (input to block)</text>
  <path d="M520,140 L520,170" fill="none" stroke="#1a1d23" stroke-width="2.2"  marker-end="url(#dg-transformer-block-arrow-ink)" stroke-linecap="round"/>
  <rect x="430" y="190" width="180" height="40" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="520" y="211.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">RMSNorm</text>
  <path d="M520,190 L520,230" fill="none" stroke="#1a1d23" stroke-width="2"  marker-end="url(#dg-transformer-block-arrow-ink)" stroke-linecap="round"/>
  <rect x="190" y="250" width="660" height="230" rx="12" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="2"/>
  <text x="520" y="272" font-size="13.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1f5fa8">Multi-Head Self-Attention (causal)</text>
  <text x="280" y="294" font-size="10.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">Query heads (8)</text>
  <rect x="220" y="302" width="24" height="16" rx="3" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1.2"/>
  <rect x="250" y="302" width="24" height="16" rx="3" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1.2"/>
  <rect x="280" y="302" width="24" height="16" rx="3" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1.2"/>
  <rect x="310" y="302" width="24" height="16" rx="3" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1.2"/>
  <rect x="220" y="324" width="24" height="16" rx="3" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1.2"/>
  <rect x="250" y="324" width="24" height="16" rx="3" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1.2"/>
  <rect x="280" y="324" width="24" height="16" rx="3" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1.2"/>
  <rect x="310" y="324" width="24" height="16" rx="3" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1.2"/>
  <text x="280" y="358" font-size="9.8" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1f5fa8">× RoPE rotation θ·pos applied to Q</text>
  <text x="540" y="294" font-size="10.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">KV head groups (2)</text>
  <rect x="500" y="302" width="40" height="34" rx="4" fill="#c9e9e9" stroke="#0f7d82" stroke-width="1.4"/>
  <text x="520" y="324" font-size="10" text-anchor="middle" font-weight="600" font-style="normal" fill="#0f7d82">K,V</text>
  <rect x="550" y="302" width="40" height="34" rx="4" fill="#c9e9e9" stroke="#0f7d82" stroke-width="1.4"/>
  <text x="570" y="324" font-size="10" text-anchor="middle" font-weight="600" font-style="normal" fill="#0f7d82">K,V</text>
  <text x="540" y="358" font-size="9.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#0f7d82">× RoPE rotation applied to K — GQA: 4 Q heads share each KV group</text>
  <path d="M232,324 C370,340 520,340 520,336" fill="none" stroke="#565d6b" stroke-width="1" stroke-dasharray="7,5" marker-end="url(#dg-transformer-block-arrow-open)" stroke-linecap="round"/>
  <path d="M262,324 C370,340 520,340 520,336" fill="none" stroke="#565d6b" stroke-width="1" stroke-dasharray="7,5" marker-end="url(#dg-transformer-block-arrow-open)" stroke-linecap="round"/>
  <path d="M292,324 C370,340 520,340 520,336" fill="none" stroke="#565d6b" stroke-width="1" stroke-dasharray="7,5" marker-end="url(#dg-transformer-block-arrow-open)" stroke-linecap="round"/>
  <path d="M322,324 C370,340 520,340 520,336" fill="none" stroke="#565d6b" stroke-width="1" stroke-dasharray="7,5" marker-end="url(#dg-transformer-block-arrow-open)" stroke-linecap="round"/>
  <path d="M232,346 C370,360 570,340 570,336" fill="none" stroke="#565d6b" stroke-width="1" stroke-dasharray="7,5" marker-end="url(#dg-transformer-block-arrow-open)" stroke-linecap="round"/>
  <path d="M262,346 C370,360 570,340 570,336" fill="none" stroke="#565d6b" stroke-width="1" stroke-dasharray="7,5" marker-end="url(#dg-transformer-block-arrow-open)" stroke-linecap="round"/>
  <path d="M292,346 C370,360 570,340 570,336" fill="none" stroke="#565d6b" stroke-width="1" stroke-dasharray="7,5" marker-end="url(#dg-transformer-block-arrow-open)" stroke-linecap="round"/>
  <path d="M322,346 C370,360 570,340 570,336" fill="none" stroke="#565d6b" stroke-width="1" stroke-dasharray="7,5" marker-end="url(#dg-transformer-block-arrow-open)" stroke-linecap="round"/>
  <text x="520" y="390" font-size="11.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1a1d23">scores = (Q_rope · K_ropeᵀ) / √d_k  +  causal mask</text>
  <text x="520" y="408" font-size="11.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1a1d23">softmax(scores) · V  → concat heads → output projection W_O</text>
  <text x="520" y="432" font-size="10.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">KV cache per step stores only the 2 shared K,V groups — GQA&#x27;s memory saving</text>
  <rect x="220" y="446" width="600" height="22" rx="5" fill="#fbf1de" stroke="#9a6400" stroke-width="1.2"/>
  <text x="520" y="461" font-size="10" text-anchor="middle" font-weight="normal" font-style="normal" fill="#9a6400">causal mask blocks attention to future positions (decoder-only training)</text>
  <path d="M520,480 L520,506" fill="none" stroke="#1a1d23" stroke-width="2"  marker-end="url(#dg-transformer-block-arrow-ink)" stroke-linecap="round"/>
  <circle cx="520" cy="520" r="15" fill="#ffffff" stroke="#1a1d23" stroke-width="1.8"/><text x="520" y="525" font-size="15" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">⊕</text>
  <path d="M430,190 L140,190 L140,520 L505,520" fill="none" stroke="#565d6b" stroke-width="2.2" stroke-dasharray="7,5" marker-end="url(#dg-transformer-block-arrow-open)" stroke-linecap="round"/><rect x="86.5" y="327" width="107" height="14" fill="#ffffff" opacity="0.9"/><text x="140" y="338" font-size="11.5" text-anchor="middle" font-weight="600" font-style="normal" fill="#565d6b">residual bypass</text>
  <rect x="430" y="554" width="180" height="40" rx="8" fill="#f2e9f8" stroke="#7b3fb0" stroke-width="1.8"/><text x="520" y="575.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">RMSNorm</text>
  <path d="M520,554 L520,594" fill="none" stroke="#1a1d23" stroke-width="2"  marker-end="url(#dg-transformer-block-arrow-ink)" stroke-linecap="round"/>
  <rect x="260" y="614" width="520" height="130" rx="12" fill="#f2e9f8" stroke="#7b3fb0" stroke-width="2"/>
  <text x="520" y="636" font-size="13.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#7b3fb0">SwiGLU Feed-Forward</text>
  <text x="520" y="658" font-size="11.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1a1d23">gate = SiLU(xW_g)      up = xW_u</text>
  <text x="520" y="676" font-size="11.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1a1d23">hidden = gate ⊙ up   (elementwise gating)</text>
  <text x="520" y="694" font-size="11.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1a1d23">output = hidden · W_d</text>
  <text x="520" y="716" font-size="10" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">gated linear unit adds a multiplicative interaction the plain ReLU-MLP lacked</text>
  <path d="M520,744 L520,770" fill="none" stroke="#1a1d23" stroke-width="2"  marker-end="url(#dg-transformer-block-arrow-ink)" stroke-linecap="round"/>
  <circle cx="520" cy="784" r="15" fill="#ffffff" stroke="#1a1d23" stroke-width="1.8"/><text x="520" y="789" font-size="15" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">⊕</text>
  <path d="M430,554 L210,554 L210,784 L505,784" fill="none" stroke="#565d6b" stroke-width="2.2" stroke-dasharray="7,5" marker-end="url(#dg-transformer-block-arrow-open)" stroke-linecap="round"/><rect x="156.5" y="641" width="107" height="14" fill="#ffffff" opacity="0.9"/><text x="210" y="652" font-size="11.5" text-anchor="middle" font-weight="600" font-style="normal" fill="#565d6b">residual bypass</text>
  <path d="M520,798 L520,824" fill="none" stroke="#1a1d23" stroke-width="2.2"  marker-end="url(#dg-transformer-block-arrow-ink)" stroke-linecap="round"/>
  <rect x="430" y="824" width="180" height="40" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="520" y="845.14" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">output to next block</text>
  <rect x="30" y="260" width="190" height="130" rx="8" fill="#ffffff" stroke="#9aa2b1" stroke-width="1.3"/>
<text x="44" y="280" font-size="12.5" text-anchor="start" font-weight="700" font-style="normal" fill="#1a1d23">Legend</text>
