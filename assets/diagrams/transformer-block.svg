<text x="86" y="320" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">feed-forward data path</text>
<path d="M44,336 L78,336" fill="none" stroke="#565d6b" stroke-width="2.0" stroke-dasharray="7,5" marker-end="url(#dg-transformer-block-arrow-open)" stroke-linecap="round"/>
<text x="86" y="340" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">residual bypass (⊕ add)</text>
<rect x="44" y="348" width="26" height="14" rx="3" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.6"/>
<text x="86" y="360" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">shared KV group (GQA)</text>
  </g>
