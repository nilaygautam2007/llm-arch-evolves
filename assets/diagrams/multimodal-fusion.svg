<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" role="img" aria-labelledby="dg-multimodal-fusion-title dg-multimodal-fusion-desc">
  <title id="dg-multimodal-fusion-title">Multimodal fusion: projector (soft-token) path versus cross-attention path</title>
  <desc id="dg-multimodal-fusion-desc">Non-text inputs such as images must be converted into a form the language model can consume. Both paths start with a modality encoder, for example a vision transformer, that turns an image into a grid of feature vectors. In the projector, or adapter, path, a small trainable network maps those features into the same embedding space as text tokens, producing a handful of soft tokens that are concatenated directly into the LLM&#x27;s input sequence, so the LLM attends over them with the same self-attention it already uses for text; this is simple and lets image tokens participate in every layer as if they were words. In the cross-attention path, the image features are kept as a separate sequence and the language model&#x27;s layers each contain an added cross-attention block where text queries attend directly over the image feature map, keeping modalities architecturally separate rather than merging them into one token stream; video adds a time dimension that multiplies the token or feature count.</desc>
  <defs>
    <marker id="dg-multimodal-fusion-arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1f5fa8"/></marker>
    <marker id="dg-multimodal-fusion-arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#0f7d82"/></marker>
    <marker id="dg-multimodal-fusion-arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7b3fb0"/></marker>
    <marker id="dg-multimodal-fusion-arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#565d6b"/></marker>
    <marker id="dg-multimodal-fusion-arrow-danger" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b3261e"/></marker>
    <marker id="dg-multimodal-fusion-arrow-warn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#9a6400"/></marker>
    <marker id="dg-multimodal-fusion-arrow-success" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1b7a43"/></marker>
    <marker id="dg-multimodal-fusion-arrow-ink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1a1d23"/></marker>
    <marker id="dg-multimodal-fusion-arrow-open" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M1,1 L10,6 L1,11" fill="none" stroke="#565d6b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="dg-multimodal-fusion-arrow-diamond" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M5,0 L10,5 L5,10 L0,5 Z" fill="#7b3fb0"/></marker>
    <pattern id="dg-multimodal-fusion-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#ffffff"/><line x1="0" y1="0" x2="0" y2="6" stroke="#d9dce1" stroke-width="2"/></pattern>
    <pattern id="dg-multimodal-fusion-hatch-danger" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#fbe9e7"/><line x1="0" y1="0" x2="0" y2="6" stroke="#b3261e" stroke-width="1.4"/></pattern>
  </defs>
  <rect x="0" y="0" width="1100" height="600" fill="#ffffff"/>
  <g font-family="Segoe UI, Arial, sans-serif">
  <text x="550" y="30" font-size="19" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Multimodal Fusion: Two Mechanisms</text>
  <text x="550" y="51" font-size="12.3" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">Ch. 18 — inject image information as extra tokens, or let the LLM cross-attend to it directly</text>
  <line x1="550" y1="75" x2="550" y2="560" stroke="#d9dce1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="275" y="90" font-size="14" text-anchor="middle" font-weight="700" font-style="normal" fill="#1f5fa8">Projector (soft-token) fusion</text>
  <rect x="60" y="110" width="130" height="56" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="125" y="139.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Image</text>
  <rect x="230" y="110" width="150" height="56" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="305" y="131.64" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Vision encoder</text><text x="305" y="146.64" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">(e.g. ViT/CLIP)</text>
  <path d="M190,138 L230,138" fill="none" stroke="#1f5fa8" stroke-width="2"  marker-end="url(#dg-multimodal-fusion-arrow-blue)" stroke-linecap="round"/>
  <rect x="420" y="110" width="130" height="56" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="485" y="131.64" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Projector</text><text x="485" y="146.64" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">(MLP adapter)</text>
  <path d="M380,138 L420,138" fill="none" stroke="#1f5fa8" stroke-width="2"  marker-end="url(#dg-multimodal-fusion-arrow-blue)" stroke-linecap="round"/>
  <text x="275" y="216" font-size="11" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">LLM input token sequence</text>
  <rect x="60" y="230" width="54" height="34" rx="5" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.4"/>
  <text x="87" y="252" font-size="10" text-anchor="middle" font-weight="600" font-style="normal" fill="#1a1d23">t1</text>
  <rect x="122" y="230" width="54" height="34" rx="5" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.4"/>
  <text x="149" y="252" font-size="10" text-anchor="middle" font-weight="600" font-style="normal" fill="#1a1d23">t2</text>
  <rect x="184" y="230" width="54" height="34" rx="5" fill="#c9e9e9" stroke="#0f7d82" stroke-width="1.4"/>
  <text x="211" y="252" font-size="10" text-anchor="middle" font-weight="600" font-style="normal" fill="#1a1d23">img1</text>
  <rect x="246" y="230" width="54" height="34" rx="5" fill="#c9e9e9" stroke="#0f7d82" stroke-width="1.4"/>
  <text x="273" y="252" font-size="10" text-anchor="middle" font-weight="600" font-style="normal" fill="#1a1d23">img2</text>
  <rect x="308" y="230" width="54" height="34" rx="5" fill="#c9e9e9" stroke="#0f7d82" stroke-width="1.4"/>
  <text x="335" y="252" font-size="10" text-anchor="middle" font-weight="600" font-style="normal" fill="#1a1d23">img3</text>
  <rect x="370" y="230" width="54" height="34" rx="5" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.4"/>
  <text x="397" y="252" font-size="10" text-anchor="middle" font-weight="600" font-style="normal" fill="#1a1d23">t3</text>
  <rect x="432" y="230" width="54" height="34" rx="5" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.4"/>
  <text x="459" y="252" font-size="10" text-anchor="middle" font-weight="600" font-style="normal" fill="#1a1d23">t4</text>
  <path d="M485,166 L211,230" fill="none" stroke="#0f7d82" stroke-width="1.8"  marker-end="url(#dg-multimodal-fusion-arrow-teal)" stroke-linecap="round"/>
  <text x="211" y="200" font-size="9.8" text-anchor="middle" font-weight="normal" font-style="normal" fill="#0f7d82">soft tokens spliced in</text>
  <rect x="40" y="300" width="460" height="60" rx="10" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/>
  <text x="270" y="322" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1f5fa8">Standard self-attention</text>
  <text x="270" y="340" font-size="10.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1a1d23">treats image and text tokens identically at every layer</text>
  <path d="M275,264 L275,300" fill="none" stroke="#1f5fa8" stroke-width="2"  marker-end="url(#dg-multimodal-fusion-arrow-blue)" stroke-linecap="round"/>
  <text x="40" y="400" font-size="10.6" text-anchor="start" font-weight="400" font-style="normal" fill="#565d6b">Simple to add to an existing decoder-only LLM; image tokens cost context-length budget like text.</text>
  <text x="825" y="90" font-size="14" text-anchor="middle" font-weight="700" font-style="normal" fill="#7b3fb0">Cross-attention fusion</text>
  <rect x="610" y="110" width="130" height="56" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="675" y="139.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Image</text>
  <rect x="780" y="110" width="170" height="56" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="865" y="131.78" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Vision encoder</text><text x="865" y="146.28" font-size="9.8" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">→ feature map (kept separate)</text>
  <path d="M740,138 L780,138" fill="none" stroke="#1f5fa8" stroke-width="2"  marker-end="url(#dg-multimodal-fusion-arrow-blue)" stroke-linecap="round"/>
  <rect x="610" y="220" width="340" height="70" rx="10" fill="#f2e9f8" stroke="#7b3fb0" stroke-width="1.8"/>
  <text x="700" y="244" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#7b3fb0">LLM layer 1</text>
  <text x="700" y="262" font-size="9.8" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">self-attn + FFN</text>
  <rect x="800" y="232" width="140" height="46" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.6"/>
  <text x="870" y="250" font-size="10.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#0f7d82">cross-attn</text>
  <text x="870" y="266" font-size="8.8" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">text query → image K/V</text>
  <path d="M865,166 C950,200 870,214 870,232" fill="none" stroke="#7b3fb0" stroke-width="1.4" stroke-dasharray="1.6,3.4" marker-end="url(#dg-multimodal-fusion-arrow-diamond)" stroke-linecap="round"/>
  <rect x="610" y="310" width="340" height="70" rx="10" fill="#f2e9f8" stroke="#7b3fb0" stroke-width="1.8"/>
  <text x="700" y="334" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#7b3fb0">LLM layer 2</text>
  <text x="700" y="352" font-size="9.8" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">self-attn + FFN</text>
  <rect x="800" y="322" width="140" height="46" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.6"/>
  <text x="870" y="340" font-size="10.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#0f7d82">cross-attn</text>
  <text x="870" y="356" font-size="8.8" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">text query → image K/V</text>
  <path d="M865,166 C950,200 870,304 870,322" fill="none" stroke="#7b3fb0" stroke-width="1.4" stroke-dasharray="1.6,3.4" marker-end="url(#dg-multimodal-fusion-arrow-diamond)" stroke-linecap="round"/>
  <path d="M700,290 L700,310" fill="none" stroke="#7b3fb0" stroke-width="1.8"  marker-end="url(#dg-multimodal-fusion-arrow-purple)" stroke-linecap="round"/>
  <rect x="610" y="400" width="340" height="70" rx="10" fill="#f2e9f8" stroke="#7b3fb0" stroke-width="1.8"/>
  <text x="700" y="424" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#7b3fb0">LLM layer 3</text>
  <text x="700" y="442" font-size="9.8" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">self-attn + FFN</text>
  <rect x="800" y="412" width="140" height="46" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.6"/>
  <text x="870" y="430" font-size="10.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#0f7d82">cross-attn</text>
  <text x="870" y="446" font-size="8.8" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">text query → image K/V</text>
  <path d="M865,166 C950,200 870,394 870,412" fill="none" stroke="#7b3fb0" stroke-width="1.4" stroke-dasharray="1.6,3.4" marker-end="url(#dg-multimodal-fusion-arrow-diamond)" stroke-linecap="round"/>
  <path d="M700,380 L700,400" fill="none" stroke="#7b3fb0" stroke-width="1.8"  marker-end="url(#dg-multimodal-fusion-arrow-purple)" stroke-linecap="round"/>
  <text x="610" y="530" font-size="10.6" text-anchor="start" font-weight="400" font-style="normal" fill="#565d6b">Image features stay a separate sequence; each layer&#x27;s added cross-attention lets text tokens query them directly.</text>
  <rect x="40" y="460" width="470" height="88" rx="8" fill="#ffffff" stroke="#9aa2b1" stroke-width="1.3"/>
<text x="54" y="480" font-size="12.5" text-anchor="start" font-weight="700" font-style="normal" fill="#1a1d23">Legend</text>
<path d="M54,496 L88,496" fill="none" stroke="#1f5fa8" stroke-width="2.0"  marker-end="url(#dg-multimodal-fusion-arrow-blue)" stroke-linecap="round"/>
<text x="96" y="500" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">encoder / self-attention path</text>
<rect x="54" y="508" width="26" height="14" rx="3" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.6"/>
<text x="96" y="520" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">image-derived tokens or cross-attention block</text>
<path d="M54,536 L88,536" fill="none" stroke="#7b3fb0" stroke-width="2.0" stroke-dasharray="1.6,3.4" marker-end="url(#dg-multimodal-fusion-arrow-diamond)" stroke-linecap="round"/>
<text x="96" y="540" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">cross-attention link (text queries, image keys/values)</text>
  </g>
</svg>
