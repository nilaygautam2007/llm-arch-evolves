<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 630" role="img" aria-labelledby="dg-reasoning-verifier-loop-title dg-reasoning-verifier-loop-desc">
  <title id="dg-reasoning-verifier-loop-title">Test-time reasoning with candidate generation, a verifier, and refinement</title>
  <desc id="dg-reasoning-verifier-loop-desc">Rather than changing the Transformer&#x27;s forward pass, current reasoning capability is presented largely as a surrounding system. The base model first produces one or more candidate reasoning traces, chains of intermediate steps that act as scratch space rather than a hidden computation the model must do in a single pass. A verifier or reward model then scores each candidate, either as an outcome reward model judging only the final answer (ORM) or a process reward model judging intermediate steps (PRM). The highest scoring candidate is selected, for example via best-of-N sampling or a search procedure over partial traces, and may be fed back for another round of refinement before a final answer is emitted; spending more candidates or search at inference time is test-time compute scaling, a different lever from making the base model itself larger.</desc>
  <defs>
    <marker id="dg-reasoning-verifier-loop-arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1f5fa8"/></marker>
    <marker id="dg-reasoning-verifier-loop-arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#0f7d82"/></marker>
    <marker id="dg-reasoning-verifier-loop-arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7b3fb0"/></marker>
    <marker id="dg-reasoning-verifier-loop-arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#565d6b"/></marker>
    <marker id="dg-reasoning-verifier-loop-arrow-danger" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b3261e"/></marker>
    <marker id="dg-reasoning-verifier-loop-arrow-warn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#9a6400"/></marker>
    <marker id="dg-reasoning-verifier-loop-arrow-success" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1b7a43"/></marker>
    <marker id="dg-reasoning-verifier-loop-arrow-ink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1a1d23"/></marker>
    <marker id="dg-reasoning-verifier-loop-arrow-open" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M1,1 L10,6 L1,11" fill="none" stroke="#565d6b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="dg-reasoning-verifier-loop-arrow-diamond" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M5,0 L10,5 L5,10 L0,5 Z" fill="#7b3fb0"/></marker>
    <pattern id="dg-reasoning-verifier-loop-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#ffffff"/><line x1="0" y1="0" x2="0" y2="6" stroke="#d9dce1" stroke-width="2"/></pattern>
    <pattern id="dg-reasoning-verifier-loop-hatch-danger" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#fbe9e7"/><line x1="0" y1="0" x2="0" y2="6" stroke="#b3261e" stroke-width="1.4"/></pattern>
  </defs>
  <rect x="0" y="0" width="1080" height="630" fill="#ffffff"/>
  <g font-family="Segoe UI, Arial, sans-serif">
  <text x="540" y="30" font-size="19" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Reasoning as a Test-Time System</text>
  <text x="540" y="51" font-size="12.3" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">Ch. 19 — candidate traces + verifier/reward model + selection/refinement, not a changed forward pass</text>
  <rect x="40" y="110" width="150" height="60" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="115" y="133.5" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Base model</text><text x="115" y="149" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">+ prompt / question</text>
  <rect x="260" y="90" width="190" height="66" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="355" y="116.64" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Candidate trace A</text><text x="355" y="131.64" font-size="9.8" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">step 1 → step 2 → … → answer</text>
  <path d="M190,140 L260,123" fill="none" stroke="#565d6b" stroke-width="1.8"  marker-end="url(#dg-reasoning-verifier-loop-arrow-gray)" stroke-linecap="round"/>
  <rect x="260" y="176" width="190" height="66" rx="8" fill="#e8f5ec" stroke="#1b7a43" stroke-width="1.8"/><text x="355" y="202.64" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Candidate trace B</text><text x="355" y="217.64" font-size="9.8" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">step 1 → step 2 → … → answer</text>
  <path d="M190,140 L260,209" fill="none" stroke="#565d6b" stroke-width="1.8"  marker-end="url(#dg-reasoning-verifier-loop-arrow-gray)" stroke-linecap="round"/>
  <rect x="260" y="262" width="190" height="66" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="355" y="288.64" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Candidate trace C</text><text x="355" y="303.64" font-size="9.8" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">step 1 → step 2 → … → answer</text>
  <path d="M190,140 L260,295" fill="none" stroke="#565d6b" stroke-width="1.8"  marker-end="url(#dg-reasoning-verifier-loop-arrow-gray)" stroke-linecap="round"/>
  <rect x="540" y="150" width="190" height="130" rx="10" fill="#f2e9f8" stroke="#7b3fb0" stroke-width="2"/>
  <text x="635" y="174" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#7b3fb0">Verifier / reward model</text>
  <text x="635" y="194" font-size="10" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1a1d23">ORM: scores final answer only</text>
  <text x="635" y="210" font-size="10" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1a1d23">PRM: scores each intermediate step</text>
  <text x="635" y="230" font-size="10" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">assigns a scalar score per candidate</text>
  <path d="M450,123 L540,190" fill="none" stroke="#7b3fb0" stroke-width="1.6" stroke-dasharray="1.6,3.4" marker-end="url(#dg-reasoning-verifier-loop-arrow-diamond)" stroke-linecap="round"/>
  <text x="494" y="186" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">score 0.31</text>
  <path d="M450,209 L540,220" fill="none" stroke="#7b3fb0" stroke-width="1.6" stroke-dasharray="1.6,3.4" marker-end="url(#dg-reasoning-verifier-loop-arrow-diamond)" stroke-linecap="round"/>
  <text x="494" y="216" font-size="9.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1b7a43">score 0.88</text>
  <path d="M450,295 L540,250" fill="none" stroke="#7b3fb0" stroke-width="1.6" stroke-dasharray="1.6,3.4" marker-end="url(#dg-reasoning-verifier-loop-arrow-diamond)" stroke-linecap="round"/>
  <text x="494" y="246" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">score 0.54</text>
  <rect x="800" y="150" width="200" height="70" rx="8" fill="#e8f5ec" stroke="#1b7a43" stroke-width="1.8"/><text x="900" y="171.14" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Select</text><text x="900" y="186.14" font-size="9.8" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">best-of-N / search picks</text><text x="900" y="201.14" font-size="9.8" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">highest-scoring candidate</text>
  <path d="M730,215 L800,185" fill="none" stroke="#7b3fb0" stroke-width="2"  marker-end="url(#dg-reasoning-verifier-loop-arrow-purple)" stroke-linecap="round"/>
  <path d="M900,220 C900,340 115,340 115,170" fill="none" stroke="#565d6b" stroke-width="2.2" stroke-dasharray="7,5" marker-end="url(#dg-reasoning-verifier-loop-arrow-open)" stroke-linecap="round"/><rect x="336.9" y="349" width="186.2" height="14" fill="#ffffff" opacity="0.9"/><text x="430" y="360" font-size="11.5" text-anchor="middle" font-weight="600" font-style="normal" fill="#565d6b">refine: retry with feedback</text>
  <rect x="800" y="280" width="200" height="60" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="900" y="303.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Final answer</text><text x="900" y="319.36" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">emitted to user</text>
  <path d="M900,220 L900,280" fill="none" stroke="#0f7d82" stroke-width="2"  marker-end="url(#dg-reasoning-verifier-loop-arrow-teal)" stroke-linecap="round"/>
  <rect x="40" y="420" width="900" height="90" rx="10" fill="#fbf1de" stroke="#9a6400" stroke-width="1.5"/>
  <text x="60" y="444" font-size="12.5" text-anchor="start" font-weight="700" font-style="normal" fill="#9a6400">Test-time compute scaling</text>
  <text x="60" y="462" font-size="11" text-anchor="start" fill="#1a1d23"><tspan x="60" dy="0" font-weight="normal">Generating more candidates or searching deeper trades inference cost for</tspan><tspan x="60" dy="16" font-weight="normal">answer quality — a lever separate from increasing base-model parameter count.</tspan></text>
  <rect x="40" y="520" width="300" height="100" rx="8" fill="#ffffff" stroke="#9aa2b1" stroke-width="1.3"/>
<text x="54" y="540" font-size="12.5" text-anchor="start" font-weight="700" font-style="normal" fill="#1a1d23">Legend</text>
<path d="M54,556 L88,556" fill="none" stroke="#7b3fb0" stroke-width="2.0"  marker-end="url(#dg-reasoning-verifier-loop-arrow-purple)" stroke-linecap="round"/>
<text x="96" y="560" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">verifier scoring</text>
<path d="M54,576 L88,576" fill="none" stroke="#0f7d82" stroke-width="2.0"  marker-end="url(#dg-reasoning-verifier-loop-arrow-teal)" stroke-linecap="round"/>
<text x="96" y="580" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">final output</text>
<path d="M54,596 L88,596" fill="none" stroke="#565d6b" stroke-width="2.0" stroke-dasharray="7,5" marker-end="url(#dg-reasoning-verifier-loop-arrow-open)" stroke-linecap="round"/>
<text x="96" y="600" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">refinement / retry loop</text>
  </g>
</svg>
