<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="dg-nplm-title dg-nplm-desc">
  <title id="dg-nplm-title">Neural probabilistic language model (Bengio, 2003)</title>
  <desc id="dg-nplm-desc">A fixed window of the previous n-1 words is looked up in one shared embedding table, so similar words get similar vectors and the model generalizes across contexts that share no exact words in common. The embeddings are concatenated into a single vector, passed through a tanh hidden layer, and then projected to a softmax over the entire vocabulary to predict the next word. The window is still fixed in length, and the final softmax over a large vocabulary is computationally expensive — the softmax bottleneck.</desc>
  <defs>
    <marker id="dg-nplm-arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1f5fa8"/></marker>
    <marker id="dg-nplm-arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#0f7d82"/></marker>
    <marker id="dg-nplm-arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7b3fb0"/></marker>
    <marker id="dg-nplm-arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#565d6b"/></marker>
    <marker id="dg-nplm-arrow-danger" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b3261e"/></marker>
    <marker id="dg-nplm-arrow-warn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#9a6400"/></marker>
    <marker id="dg-nplm-arrow-success" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1b7a43"/></marker>
    <marker id="dg-nplm-arrow-ink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1a1d23"/></marker>
    <marker id="dg-nplm-arrow-open" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M1,1 L10,6 L1,11" fill="none" stroke="#565d6b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="dg-nplm-arrow-diamond" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M5,0 L10,5 L5,10 L0,5 Z" fill="#7b3fb0"/></marker>
    <pattern id="dg-nplm-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#ffffff"/><line x1="0" y1="0" x2="0" y2="6" stroke="#d9dce1" stroke-width="2"/></pattern>
    <pattern id="dg-nplm-hatch-danger" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#fbe9e7"/><line x1="0" y1="0" x2="0" y2="6" stroke="#b3261e" stroke-width="1.4"/></pattern>
  </defs>
  <rect x="0" y="0" width="1000" height="520" fill="#ffffff"/>
  <g font-family="Segoe UI, Arial, sans-serif">
  <text x="500" y="30" font-size="19" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Neural Probabilistic Language Model</text>
  <text x="500" y="51" font-size="12.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">Ch. 3 — Bengio (2003): shared embeddings replace sparse count lookup, window is still fixed</text>
  <rect x="90" y="110" width="150" height="60" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="165" y="133.08" font-size="14" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">w_{t-3}</text><text x="165" y="150.08" font-size="10.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">input token</text>
  <rect x="90" y="200" width="150" height="60" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="165" y="223.08" font-size="14" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">w_{t-2}</text><text x="165" y="240.08" font-size="10.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">input token</text>
  <rect x="90" y="290" width="150" height="60" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="165" y="313.08" font-size="14" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">w_{t-1}</text><text x="165" y="330.08" font-size="10.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">input token</text>
  <rect x="330" y="40" width="190" height="330" rx="10" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="2" stroke-dasharray="2,3"/>
  <text x="425" y="62" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Shared embedding table C</text>
  <text x="425" y="80" font-size="10.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">(one lookup matrix, reused</text>
  <text x="425" y="94" font-size="10.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">for every context position)</text>
  <rect x="355" y="120" width="140" height="60" rx="6" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1.4"/>
  <text x="425" y="155" font-size="12.5" text-anchor="middle" font-weight="600" font-style="normal" fill="#1a1d23">C[w_{t-3}]</text>
  <path d="M240,140 L355,150" fill="none" stroke="#1f5fa8" stroke-width="1.8"  marker-end="url(#dg-nplm-arrow-blue)" stroke-linecap="round"/>
  <rect x="355" y="210" width="140" height="60" rx="6" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1.4"/>
  <text x="425" y="245" font-size="12.5" text-anchor="middle" font-weight="600" font-style="normal" fill="#1a1d23">C[w_{t-2}]</text>
  <path d="M240,230 L355,240" fill="none" stroke="#1f5fa8" stroke-width="1.8"  marker-end="url(#dg-nplm-arrow-blue)" stroke-linecap="round"/>
  <rect x="355" y="300" width="140" height="60" rx="6" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1.4"/>
  <text x="425" y="335" font-size="12.5" text-anchor="middle" font-weight="600" font-style="normal" fill="#1a1d23">C[w_{t-1}]</text>
  <path d="M240,320 L355,330" fill="none" stroke="#1f5fa8" stroke-width="1.8"  marker-end="url(#dg-nplm-arrow-blue)" stroke-linecap="round"/>
  <path d="M338,150 L338,240" fill="none" stroke="#565d6b" stroke-width="1.4" stroke-dasharray="7,5" marker-end="url(#dg-nplm-arrow-open)" stroke-linecap="round"/>
  <path d="M338,240 L338,330" fill="none" stroke="#565d6b" stroke-width="1.4" stroke-dasharray="7,5" marker-end="url(#dg-nplm-arrow-open)" stroke-linecap="round"/>
  <text x="338" y="340" font-size="9.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">shared</text>
  <text x="338" y="352" font-size="9.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">weights</text>
  <rect x="580" y="170" width="130" height="70" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="645" y="198.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Concatenate</text><text x="645" y="214.36" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">[C(w_{t-3}); C(w_{t-2}); C(w_{t-1})]</text>
  <path d="M495,150 L580,205" fill="none" stroke="#0f7d82" stroke-width="1.6"  marker-end="url(#dg-nplm-arrow-teal)" stroke-linecap="round"/>
  <path d="M495,240 L580,205" fill="none" stroke="#0f7d82" stroke-width="1.6"  marker-end="url(#dg-nplm-arrow-teal)" stroke-linecap="round"/>
  <path d="M495,330 L580,205" fill="none" stroke="#0f7d82" stroke-width="1.6"  marker-end="url(#dg-nplm-arrow-teal)" stroke-linecap="round"/>
  <rect x="760" y="170" width="120" height="70" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="820" y="198.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Hidden layer</text><text x="820" y="214.36" font-size="10.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">tanh(Hx + d)</text>
  <path d="M710,205 L760,205" fill="none" stroke="#0f7d82" stroke-width="2"  marker-end="url(#dg-nplm-arrow-teal)" stroke-linecap="round"/>
  <rect x="700" y="300" width="220" height="90" rx="8" fill="#fbe9e7" stroke="#b3261e" stroke-width="1.8"/><text x="810" y="330.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Softmax over |V|</text><text x="810" y="346.36" font-size="10.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">P(w_t | context)</text><text x="810" y="362.36" font-size="10.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">cost scales with vocabulary size — bottleneck</text>
  <path d="M820,240 L810,300" fill="none" stroke="#b3261e" stroke-width="2"  marker-end="url(#dg-nplm-arrow-danger)" stroke-linecap="round"/>
  <text x="810" y="412" font-size="12" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">predicted next word w_t</text>
  <path d="M810,390 L810,402" fill="none" stroke="#b3261e" stroke-width="1.8"  marker-end="url(#dg-nplm-arrow-danger)" stroke-linecap="round"/>
  <rect x="30" y="400" width="300" height="108" rx="8" fill="#ffffff" stroke="#9aa2b1" stroke-width="1.3"/>
<text x="44" y="420" font-size="12.5" text-anchor="start" font-weight="700" font-style="normal" fill="#1a1d23">Legend</text>
<path d="M44,436 L78,436" fill="none" stroke="#1f5fa8" stroke-width="2.0"  marker-end="url(#dg-nplm-arrow-blue)" stroke-linecap="round"/>
<text x="86" y="440" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">embedding lookup</text>
<path d="M44,456 L78,456" fill="none" stroke="#0f7d82" stroke-width="2.0"  marker-end="url(#dg-nplm-arrow-teal)" stroke-linecap="round"/>
<text x="86" y="460" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">feed-forward computation</text>
<path d="M44,476 L78,476" fill="none" stroke="#b3261e" stroke-width="2.0"  marker-end="url(#dg-nplm-arrow-danger)" stroke-linecap="round"/>
<text x="86" y="480" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">softmax bottleneck path</text>
<path d="M44,496 L78,496" fill="none" stroke="#565d6b" stroke-width="2.0" stroke-dasharray="7,5" marker-end="url(#dg-nplm-arrow-open)" stroke-linecap="round"/>
<text x="86" y="500" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">shared parameters (same matrix C)</text>
  <text x="30" y="470" font-size="11" text-anchor="start" font-weight="400" font-style="normal" fill="#565d6b">Limitation carried forward: context is still a fixed window (here n−1=3 words);</text>
  <text x="30" y="486" font-size="11" text-anchor="start" font-weight="400" font-style="normal" fill="#565d6b">it cannot use arbitrarily long history the way recurrence or attention later will.</text>
  </g>
</svg>
