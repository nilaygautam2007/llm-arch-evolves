<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" role="img" aria-labelledby="dg-rag-pipeline-title dg-rag-pipeline-desc">
  <title id="dg-rag-pipeline-title">Retrieval-augmented generation pipeline</title>
  <desc id="dg-rag-pipeline-desc">Retrieval-augmented generation keeps mutable facts out of the model&#x27;s parameters and in an external, updateable index instead. A user query is embedded into a vector and used to search a vector index of pre-chunked, pre-embedded documents, returning an initial set of candidate chunks; an optional reranking step then reorders those candidates with a more precise (and more expensive) relevance model. The top reranked chunks are assembled into a cited context block and inserted into the prompt, and the language model conditions its answer on that context, ideally citing which chunk supports each claim. Distinct failure points include retrieving the wrong chunks, poor chunk boundaries that split relevant information, an index that is stale relative to the source data, and &#x27;lost in the middle&#x27; behavior where the model under-uses information placed in the middle of a long context.</desc>
  <defs>
    <marker id="dg-rag-pipeline-arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1f5fa8"/></marker>
    <marker id="dg-rag-pipeline-arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#0f7d82"/></marker>
    <marker id="dg-rag-pipeline-arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7b3fb0"/></marker>
    <marker id="dg-rag-pipeline-arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#565d6b"/></marker>
    <marker id="dg-rag-pipeline-arrow-danger" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b3261e"/></marker>
    <marker id="dg-rag-pipeline-arrow-warn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#9a6400"/></marker>
    <marker id="dg-rag-pipeline-arrow-success" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1b7a43"/></marker>
    <marker id="dg-rag-pipeline-arrow-ink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1a1d23"/></marker>
    <marker id="dg-rag-pipeline-arrow-open" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M1,1 L10,6 L1,11" fill="none" stroke="#565d6b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="dg-rag-pipeline-arrow-diamond" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M5,0 L10,5 L5,10 L0,5 Z" fill="#7b3fb0"/></marker>
    <pattern id="dg-rag-pipeline-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#ffffff"/><line x1="0" y1="0" x2="0" y2="6" stroke="#d9dce1" stroke-width="2"/></pattern>
    <pattern id="dg-rag-pipeline-hatch-danger" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#fbe9e7"/><line x1="0" y1="0" x2="0" y2="6" stroke="#b3261e" stroke-width="1.4"/></pattern>
  </defs>
  <rect x="0" y="0" width="1120" height="520" fill="#ffffff"/>
  <g font-family="Segoe UI, Arial, sans-serif">
  <text x="560" y="30" font-size="19" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Retrieval-Augmented Generation Pipeline</text>
  <text x="560" y="51" font-size="12.3" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">Ch. 17 — mutable facts live in an updateable external index, not only in model parameters</text>
  <rect x="40" y="130" width="150" height="92" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="115" y="169.5" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Query</text><text x="115" y="185" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">user question</text>
  <rect x="200" y="130" width="150" height="92" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="275" y="169.5" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Embed query</text><text x="275" y="185" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">encode to vector q</text>
  <path d="M190,176 L200,176" fill="none" stroke="#1f5fa8" stroke-width="2"  marker-end="url(#dg-rag-pipeline-arrow-blue)" stroke-linecap="round"/>
  <rect x="360" y="130" width="150" height="92" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="435" y="154" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Vector search</text><text x="435" y="169.5" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">k-NN over chunk index</text><text x="435" y="185" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">(chunking + embeddings</text><text x="435" y="200.5" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">built offline)</text>
  <path d="M350,176 L360,176" fill="none" stroke="#1f5fa8" stroke-width="2"  marker-end="url(#dg-rag-pipeline-arrow-blue)" stroke-linecap="round"/>
  <rect x="560" y="130" width="150" height="92" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="635" y="161.75" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Rerank (optional)</text><text x="635" y="177.25" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">precise relevance model</text><text x="635" y="192.75" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">reorders candidates</text>
  <path d="M510,176 L560,176" fill="none" stroke="#0f7d82" stroke-width="2"  marker-end="url(#dg-rag-pipeline-arrow-teal)" stroke-linecap="round"/>
  <rect x="760" y="130" width="150" height="92" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="835" y="161.75" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Cited context</text><text x="835" y="177.25" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">top chunks + source ids</text><text x="835" y="192.75" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">assembled into prompt</text>
  <path d="M710,176 L760,176" fill="none" stroke="#0f7d82" stroke-width="2"  marker-end="url(#dg-rag-pipeline-arrow-teal)" stroke-linecap="round"/>
  <rect x="960" y="130" width="150" height="92" rx="8" fill="#f2e9f8" stroke="#7b3fb0" stroke-width="1.8"/><text x="1035" y="161.75" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">LLM generation</text><text x="1035" y="177.25" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">answer conditioned on</text><text x="1035" y="192.75" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">retrieved, cited context</text>
  <path d="M910,176 L960,176" fill="none" stroke="#7b3fb0" stroke-width="2"  marker-end="url(#dg-rag-pipeline-arrow-purple)" stroke-linecap="round"/>
  <rect x="360" y="300" width="150" height="80" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.6" stroke-dasharray="2,3"/>
  <text x="435" y="322" font-size="11.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Document index</text>
  <text x="435" y="340" font-size="10" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">chunk → embed → store</text>
  <text x="435" y="356" font-size="10" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">(built/updated offline)</text>
  <path d="M435,300 L435,222" fill="none" stroke="#565d6b" stroke-width="1.8" stroke-dasharray="7,5" marker-end="url(#dg-rag-pipeline-arrow-open)" stroke-linecap="round"/>
  <polygon points="115,307 190,330 115,353 40,330" fill="#fbf1de" stroke="#9a6400" stroke-width="1.8"/>
  <text x="115" y="326" font-size="9.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#9a6400">⚠ failure mode</text>
  <text x="115" y="340" font-size="9" text-anchor="middle" font-weight="normal" font-style="normal" fill="#9a6400">wrong chunks retrieved</text>
  <path d="M115,222 L115,307" fill="none" stroke="#9a6400" stroke-width="1.4" stroke-dasharray="7,5" marker-end="url(#dg-rag-pipeline-arrow-open)" stroke-linecap="round"/>
  <polygon points="275,307 350,330 275,353 200,330" fill="#fbf1de" stroke="#9a6400" stroke-width="1.8"/>
  <text x="275" y="326" font-size="9.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#9a6400">⚠ failure mode</text>
  <text x="275" y="340" font-size="9" text-anchor="middle" font-weight="normal" font-style="normal" fill="#9a6400">bad chunk boundaries</text>
  <path d="M275,222 L275,307" fill="none" stroke="#9a6400" stroke-width="1.4" stroke-dasharray="7,5" marker-end="url(#dg-rag-pipeline-arrow-open)" stroke-linecap="round"/>
  <polygon points="635,307 710,330 635,353 560,330" fill="#fbf1de" stroke="#9a6400" stroke-width="1.8"/>
  <text x="635" y="326" font-size="9.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#9a6400">⚠ failure mode</text>
  <text x="635" y="340" font-size="9" text-anchor="middle" font-weight="normal" font-style="normal" fill="#9a6400">stale index vs. source</text>
  <path d="M635,222 L635,307" fill="none" stroke="#9a6400" stroke-width="1.4" stroke-dasharray="7,5" marker-end="url(#dg-rag-pipeline-arrow-open)" stroke-linecap="round"/>
  <polygon points="835,307 910,330 835,353 760,330" fill="#fbf1de" stroke="#9a6400" stroke-width="1.8"/>
  <text x="835" y="326" font-size="9.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#9a6400">⚠ failure mode</text>
  <text x="835" y="340" font-size="9" text-anchor="middle" font-weight="normal" font-style="normal" fill="#9a6400">lost-in-the-middle</text>
  <path d="M835,222 L835,307" fill="none" stroke="#9a6400" stroke-width="1.4" stroke-dasharray="7,5" marker-end="url(#dg-rag-pipeline-arrow-open)" stroke-linecap="round"/>
  <rect x="760" y="300" width="320" height="90" rx="8" fill="#ffffff" stroke="#9aa2b1" stroke-width="1.3"/>
<text x="774" y="320" font-size="12.5" text-anchor="start" font-weight="700" font-style="normal" fill="#1a1d23">Legend</text>
<path d="M774,336 L808,336" fill="none" stroke="#1f5fa8" stroke-width="2.0"  marker-end="url(#dg-rag-pipeline-arrow-blue)" stroke-linecap="round"/>
<text x="816" y="340" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">retrieval stage</text>
<path d="M774,356 L808,356" fill="none" stroke="#0f7d82" stroke-width="2.0"  marker-end="url(#dg-rag-pipeline-arrow-teal)" stroke-linecap="round"/>
<text x="816" y="360" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">assembly stage</text>
<path d="M774,376 L808,376" fill="none" stroke="#7b3fb0" stroke-width="2.0"  marker-end="url(#dg-rag-pipeline-arrow-purple)" stroke-linecap="round"/>
<text x="816" y="380" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">generation stage</text>
<path d="M774,396 L808,396" fill="none" stroke="#565d6b" stroke-width="2.0" stroke-dasharray="7,5" marker-end="url(#dg-rag-pipeline-arrow-open)" stroke-linecap="round"/>
<text x="816" y="400" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">offline / auxiliary path</text>
<polygon points="787,407 798,415 787,423 776,415" fill="#fbf1de" stroke="#9a6400" stroke-width="1.8"/>
<text x="816" y="420" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">known failure mode</text>
  </g>
</svg>
