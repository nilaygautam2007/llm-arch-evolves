  <rect x="814" y="216" width="52" height="20" rx="4" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.3"/>
  <rect x="994" y="216" width="52" height="20" rx="4" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.3"/>
  <path d="M866,226 L994,226" fill="none" stroke="#7b3fb0" stroke-width="1.3" stroke-dasharray="1.6,3.4" marker-end="url(#dg-decoder-families-arrow-diamond)" stroke-linecap="round"/>
  <text x="840" y="152" font-size="9.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1f5fa8">encoder</text>
  <text x="1020" y="152" font-size="9.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#0f7d82">decoder</text>
  <text x="930" y="260" font-size="9.3" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">cross-attention: decoder queries, encoder keys/values</text>
  <text x="800" y="300" font-size="10.8" text-anchor="start" font-weight="normal" font-style="normal" fill="#1a1d23">• bidirectional encoder + causal decoder</text>
  <text x="800" y="326" font-size="10.8" text-anchor="start" font-weight="normal" font-style="normal" fill="#1a1d23">• bridged by cross-attention</text>
  <text x="800" y="352" font-size="10.8" text-anchor="start" font-weight="normal" font-style="normal" fill="#1a1d23">• decoder attends over all encoder outputs</text>
  <text x="800" y="378" font-size="10.8" text-anchor="start" font-weight="normal" font-style="normal" fill="#1a1d23">• strong for conditional seq2seq tasks</text>
