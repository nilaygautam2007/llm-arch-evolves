  <text x="190" y="275" font-size="9.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">attention mask (row attends to shaded columns)</text>
  <text x="60" y="300" font-size="10.8" text-anchor="start" font-weight="normal" font-style="normal" fill="#1a1d23">• bidirectional self-attention</text>
  <text x="60" y="326" font-size="10.8" text-anchor="start" font-weight="normal" font-style="normal" fill="#1a1d23">• every token sees every token</text>
  <text x="60" y="352" font-size="10.8" text-anchor="start" font-weight="normal" font-style="normal" fill="#1a1d23">• trained with masked LM (MLM)</text>
  <text x="60" y="378" font-size="10.8" text-anchor="start" font-weight="normal" font-style="normal" fill="#1a1d23">• best for understanding / classification</text>
  <rect x="410" y="90" width="300" height="470" rx="12" fill="#ffffff" stroke="#0f7d82" stroke-width="2"/>
  <text x="560" y="118" font-size="15" text-anchor="middle" font-weight="700" font-style="normal" fill="#0f7d82">Decoder-only</text>
  <text x="560" y="136" font-size="11" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">e.g. GPT family</text>
