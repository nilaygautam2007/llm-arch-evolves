"2" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1"/><rect x="570" y="215" width="18" height="18" rx="2" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1"/><rect x="590" y="215" width="18" height="18" rx="2" fill="url(#dg-decoder-families-hatch)" stroke="#d9dce1" stroke-width="1"/><rect x="510" y="235" width="18" height="18" rx="2" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1"/><rect x="530" y="235" width="18" height="18" rx="2" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1"/><rect x="550" y="235" width="18" height="18" rx="2" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1"/><rect x="570" y="235" width="18" height="18" rx="2" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1"/><rect x="590" y="235" width="18" height="18" rx="2" fill="#d7e6f7" stroke="#1f5fa8" stroke-width="1"/>
  <text x="560" y="275" font-size="9.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">attention mask (row attends to shaded columns)</text>
  <text x="430" y="300" font-size="10.8" text-anchor="start" font-weight="normal" font-style="normal" fill="#1a1d23">• causal self-attention</text>
  <text x="430" y="326" font-size="10.8" text-anchor="start" font-weight="normal" font-style="normal" fill="#1a1d23">• token sees itself + earlier tokens</text>
  <text x="430" y="352" font-size="10.8" text-anchor="start" font-weight="normal" font-style="normal" fill="#1a1d23">• trained with next-token prediction</text>
  <text x="430" y="378" font-size="10.8" text-anchor="start" font-weight="normal" font-style="normal" fill="#1a1d23">• unifies pretraining &amp; generation; dominant for general LLMs</text>
  <rect x="780" y="90" width="300" height="470" rx="12" fill="#ffffff" stroke="#7b3fb0" stroke-width="2"/>
  <text x="930" y="118" font-size="15" text-anchor="middle" font-weight="700" font-style="normal" fill="#7b3fb0">Encoder–Decoder</text>
  <text x="930" y="136" font-size="11" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">e.g. T5</text>
  <rect x="814" y="160" width="52" height="20" rx="4" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.3"/>
