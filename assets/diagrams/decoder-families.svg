<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 680" role="img" aria-labelledby="dg-decoder-families-title dg-decoder-families-desc">
  <title id="dg-decoder-families-title">Encoder-only, decoder-only, and encoder-decoder architecture families</title>
  <desc id="dg-decoder-families-desc">The three Transformer families differ mainly in their attention mask and information flow. Encoder-only models such as BERT use full bidirectional self-attention, so every token can attend to every other token in both directions; they are typically trained with masked-language-modeling and are well suited to understanding tasks rather than free-form generation. Decoder-only models such as GPT use causal self-attention, where each position can only attend to itself and earlier positions, matching left-to-right next-token generation, which unifies pretraining and generation and dominates modern general-purpose LLMs. Encoder-decoder models such as T5 keep a bidirectional encoder over the input and a causal decoder over the output, bridged by cross-attention where each decoder position attends over all encoder positions.</desc>
  <defs>
    <marker id="dg-decoder-families-arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1f5fa8"/></marker>
    <marker id="dg-decoder-families-arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#0f7d82"/></marker>
    <marker id="dg-decoder-families-arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7b3fb0"/></marker>
    <marker id="dg-decoder-families-arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#565d6b"/></marker>
    <marker id="dg-decoder-families-arrow-danger" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b3261e"/></marker>
    <marker id="dg-decoder-families-arrow-warn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#9a6400"/></marker>
    <marker id="dg-decoder-families-arrow-success" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1b7a43"/></marker>
    <marker id="dg-decoder-families-arrow-ink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1a1d23"/></marker>
    <marker id="dg-decoder-families-arrow-open" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M1,1 L10,6 L1,11" fill="none" stroke="#565d6b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="dg-decoder-families-arrow-diamond" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M5,0 L10,5 L5,10 L0,5 Z" fill="#7b3fb0"/></marker>
    <pattern id="dg-decoder-families-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#ffffff"/><line x1="0" y1="0" x2="0" y2="6" stroke="#d9dce1" stroke-width="2"/></pattern>
    <pattern id="dg-decoder-families-hatch-danger" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#fbe9e7"/><line x1="0" y1="0" x2="0" y2="6" stroke="#b3261e" stroke-width="1.4"/></pattern>
  </defs>
