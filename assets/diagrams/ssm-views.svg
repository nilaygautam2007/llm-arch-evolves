<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" role="img" aria-labelledby="dg-ssm-views-title dg-ssm-views-desc">
  <title id="dg-ssm-views-title">State-space model: recurrent view versus parallel convolutional / scan view</title>
  <desc id="dg-ssm-views-desc">A state-space model can be written two equivalent ways. In the recurrent view, a fixed-size hidden state h_t is updated from the previous state and the current input using matrices A, B and the output is read out with matrix C: this uses constant memory regardless of sequence length, unlike an ever-growing KV cache, but must be computed one step at a time. In the convolutional/parallel view, the same linear recurrence can be unrolled into a global convolution kernel or expressed with an associative parallel scan, which lets the whole sequence be computed in parallel during training, trading the RNN&#x27;s sequential bottleneck for extra structure. Mamba makes A, B, and the scan step input-selective — the parameters depend on the current input token — which restores some of attention&#x27;s content-dependent behavior while keeping the fixed-size recurrent state and using a hardware-efficient parallel scan.</desc>
  <defs>
    <marker id="dg-ssm-views-arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1f5fa8"/></marker>
    <marker id="dg-ssm-views-arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#0f7d82"/></marker>
    <marker id="dg-ssm-views-arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7b3fb0"/></marker>
    <marker id="dg-ssm-views-arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#565d6b"/></marker>
    <marker id="dg-ssm-views-arrow-danger" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b3261e"/></marker>
    <marker id="dg-ssm-views-arrow-warn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#9a6400"/></marker>
    <marker id="dg-ssm-views-arrow-success" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1b7a43"/></marker>
    <marker id="dg-ssm-views-arrow-ink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1a1d23"/></marker>
    <marker id="dg-ssm-views-arrow-open" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M1,1 L10,6 L1,11" fill="none" stroke="#565d6b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="dg-ssm-views-arrow-diamond" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M5,0 L10,5 L5,10 L0,5 Z" fill="#7b3fb0"/></marker>
    <pattern id="dg-ssm-views-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#ffffff"/><line x1="0" y1="0" x2="0" y2="6" stroke="#d9dce1" stroke-width="2"/></pattern>
    <pattern id="dg-ssm-views-hatch-danger" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#fbe9e7"/><line x1="0" y1="0" x2="0" y2="6" stroke="#b3261e" stroke-width="1.4"/></pattern>
  </defs>
  <rect x="0" y="0" width="1080" height="620" fill="#ffffff"/>
  <g font-family="Segoe UI, Arial, sans-serif">
  <text x="540" y="30" font-size="19" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">State-Space Models: Two Equivalent Views</text>
  <text x="540" y="51" font-size="12.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">Ch. 16 — same linear recurrence, computed sequentially or in parallel</text>
  <text x="260" y="90" font-size="14" text-anchor="middle" font-weight="700" font-style="normal" fill="#1f5fa8">Recurrent view (fixed-size state)</text>
  <rect x="40" y="175" width="100" height="70" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="90" y="203.64" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_1</text><text x="90" y="218.64" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">= A h_{t-1}+Bx_t</text>
  <rect x="40" y="275" width="100" height="34" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="90" y="292.92" font-size="11" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">x_1</text>
  <path d="M90,275 L90,245" fill="none" stroke="#565d6b" stroke-width="1.4"  marker-end="url(#dg-ssm-views-arrow-gray)" stroke-linecap="round"/>
  <rect x="40" y="105" width="100" height="34" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="90" y="122.81" font-size="10.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">y_1=Ch_t</text>
  <path d="M90,175 L90,139" fill="none" stroke="#0f7d82" stroke-width="1.4"  marker-end="url(#dg-ssm-views-arrow-teal)" stroke-linecap="round"/>
  <rect x="180" y="175" width="100" height="70" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="230" y="203.64" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_2</text><text x="230" y="218.64" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">= A h_{t-1}+Bx_t</text>
  <rect x="180" y="275" width="100" height="34" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="230" y="292.92" font-size="11" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">x_2</text>
  <path d="M230,275 L230,245" fill="none" stroke="#565d6b" stroke-width="1.4"  marker-end="url(#dg-ssm-views-arrow-gray)" stroke-linecap="round"/>
  <rect x="180" y="105" width="100" height="34" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="230" y="122.81" font-size="10.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">y_2=Ch_t</text>
  <path d="M230,175 L230,139" fill="none" stroke="#0f7d82" stroke-width="1.4"  marker-end="url(#dg-ssm-views-arrow-teal)" stroke-linecap="round"/>
  <path d="M140,210 L180,210" fill="none" stroke="#1f5fa8" stroke-width="2"  marker-end="url(#dg-ssm-views-arrow-blue)" stroke-linecap="round"/>
  <rect x="320" y="175" width="100" height="70" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="370" y="203.64" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_3</text><text x="370" y="218.64" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">= A h_{t-1}+Bx_t</text>
  <rect x="320" y="275" width="100" height="34" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="370" y="292.92" font-size="11" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">x_3</text>
  <path d="M370,275 L370,245" fill="none" stroke="#565d6b" stroke-width="1.4"  marker-end="url(#dg-ssm-views-arrow-gray)" stroke-linecap="round"/>
  <rect x="320" y="105" width="100" height="34" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="370" y="122.81" font-size="10.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">y_3=Ch_t</text>
  <path d="M370,175 L370,139" fill="none" stroke="#0f7d82" stroke-width="1.4"  marker-end="url(#dg-ssm-views-arrow-teal)" stroke-linecap="round"/>
  <path d="M280,210 L320,210" fill="none" stroke="#1f5fa8" stroke-width="2"  marker-end="url(#dg-ssm-views-arrow-blue)" stroke-linecap="round"/>
  <rect x="460" y="175" width="100" height="70" rx="8" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.8"/><text x="510" y="203.64" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">h_4</text><text x="510" y="218.64" font-size="9.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">= A h_{t-1}+Bx_t</text>
  <rect x="460" y="275" width="100" height="34" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="510" y="292.92" font-size="11" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">x_4</text>
  <path d="M510,275 L510,245" fill="none" stroke="#565d6b" stroke-width="1.4"  marker-end="url(#dg-ssm-views-arrow-gray)" stroke-linecap="round"/>
  <rect x="460" y="105" width="100" height="34" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="510" y="122.81" font-size="10.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">y_4=Ch_t</text>
  <path d="M510,175 L510,139" fill="none" stroke="#0f7d82" stroke-width="1.4"  marker-end="url(#dg-ssm-views-arrow-teal)" stroke-linecap="round"/>
  <path d="M420,210 L460,210" fill="none" stroke="#1f5fa8" stroke-width="2"  marker-end="url(#dg-ssm-views-arrow-blue)" stroke-linecap="round"/>
  <text x="40" y="335" font-size="10.6" text-anchor="start" font-weight="400" font-style="normal" fill="#565d6b">State size is fixed (does not grow with t) but steps run one after another — sequential, like an RNN.</text>
  <line x1="560" y1="80" x2="560" y2="480" stroke="#d9dce1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="560" y="500" font-size="11" text-anchor="middle" font-weight="normal" font-style="italic" fill="#565d6b">equivalent under a linear, time-invariant recurrence</text>
  <path d="M430,500 L550,500" fill="none" stroke="#7b3fb0" stroke-width="1.6" stroke-dasharray="1.6,3.4" marker-end="url(#dg-ssm-views-arrow-diamond)" stroke-linecap="round"/>
  <path d="M690,500 L570,500" fill="none" stroke="#7b3fb0" stroke-width="1.6" stroke-dasharray="1.6,3.4" marker-end="url(#dg-ssm-views-arrow-diamond)" stroke-linecap="round"/>
  <text x="820" y="90" font-size="14" text-anchor="middle" font-weight="700" font-style="normal" fill="#7b3fb0">Convolutional / parallel-scan view</text>
  <rect x="620" y="140" width="420" height="50" rx="8" fill="#f2e9f8" stroke="#7b3fb0" stroke-width="1.8"/><text x="830" y="166.14" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">global kernel K = (CB, CAB, CA²B, …)</text>
  <text x="830" y="210" font-size="11.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1a1d23">y = x ∗ K   (convolution over the whole sequence)</text>
  <rect x="620" y="240" width="420" height="90" rx="10" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/>
  <text x="830" y="262" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#0f7d82">associative parallel scan</text>
  <text x="830" y="282" font-size="10.8" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1a1d23">combine (A_i,B_i) pairs in O(log T) parallel steps</text>
  <text x="830" y="300" font-size="10.3" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">instead of T sequential steps — parallelizable in training</text>
  <rect x="620" y="350" width="420" height="70" rx="10" fill="#eaf1fa" stroke="#1f5fa8" stroke-width="1.6" stroke-dasharray="2,3"/>
  <text x="830" y="372" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1f5fa8">Mamba: selective SSM</text>
  <text x="830" y="390" font-size="10.3" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1a1d23">A_t, B_t, Δ_t depend on x_t — input-selective,</text>
  <text x="830" y="404" font-size="10.3" text-anchor="middle" font-weight="normal" font-style="normal" fill="#1a1d23">recomputed with a hardware-aware parallel scan</text>
  <rect x="30" y="560" width="900" height="46" rx="8" fill="#ffffff" stroke="#9aa2b1" stroke-width="1.3"/>
<text x="44" y="580" font-size="12.5" text-anchor="start" font-weight="700" font-style="normal" fill="#1a1d23">Legend</text>
<path d="M44,596 L78,596" fill="none" stroke="#1f5fa8" stroke-width="2.0"  marker-end="url(#dg-ssm-views-arrow-blue)" stroke-linecap="round"/>
<text x="86" y="600" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">sequential recurrent update</text>
<path d="M44,616 L78,616" fill="none" stroke="#0f7d82" stroke-width="2.0"  marker-end="url(#dg-ssm-views-arrow-teal)" stroke-linecap="round"/>
<text x="86" y="620" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">state readout</text>
<path d="M44,636 L78,636" fill="none" stroke="#7b3fb0" stroke-width="2.0" stroke-dasharray="1.6,3.4" marker-end="url(#dg-ssm-views-arrow-diamond)" stroke-linecap="round"/>
<text x="86" y="640" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">same underlying linear map, two computation strategies</text>
  </g>
</svg>
