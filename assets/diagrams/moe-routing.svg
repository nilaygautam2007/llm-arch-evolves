<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 640" role="img" aria-labelledby="dg-moe-routing-title dg-moe-routing-desc">
  <title id="dg-moe-routing-title">Mixture-of-experts top-k token routing and load balancing</title>
  <desc id="dg-moe-routing-desc">Each token&#x27;s hidden vector is scored against every expert by a router, which is a small learned linear layer followed by a softmax; only the top-k highest scoring experts are activated for that token (top-2 shown), so total model capacity can grow far beyond what a dense model would need to compute for every token, while active compute per token stays close to a much smaller dense model. Selected tokens are dispatched to their chosen experts, each expert applies its own feed-forward network, and the outputs are combined using the router&#x27;s gate weights. Because routing is learned, it can collapse onto a few popular experts unless a load-balancing auxiliary loss encourages roughly even usage across experts; overloaded experts must drop or delay tokens, which is a distinct failure mode from the dense case.</desc>
  <defs>
    <marker id="dg-moe-routing-arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1f5fa8"/></marker>
    <marker id="dg-moe-routing-arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#0f7d82"/></marker>
    <marker id="dg-moe-routing-arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7b3fb0"/></marker>
    <marker id="dg-moe-routing-arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#565d6b"/></marker>
    <marker id="dg-moe-routing-arrow-danger" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b3261e"/></marker>
    <marker id="dg-moe-routing-arrow-warn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#9a6400"/></marker>
    <marker id="dg-moe-routing-arrow-success" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1b7a43"/></marker>
    <marker id="dg-moe-routing-arrow-ink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1a1d23"/></marker>
    <marker id="dg-moe-routing-arrow-open" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M1,1 L10,6 L1,11" fill="none" stroke="#565d6b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="dg-moe-routing-arrow-diamond" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M5,0 L10,5 L5,10 L0,5 Z" fill="#7b3fb0"/></marker>
    <pattern id="dg-moe-routing-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#ffffff"/><line x1="0" y1="0" x2="0" y2="6" stroke="#d9dce1" stroke-width="2"/></pattern>
    <pattern id="dg-moe-routing-hatch-danger" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#fbe9e7"/><line x1="0" y1="0" x2="0" y2="6" stroke="#b3261e" stroke-width="1.4"/></pattern>
  </defs>
  <rect x="0" y="0" width="1080" height="640" fill="#ffffff"/>
  <g font-family="Segoe UI, Arial, sans-serif">
  <text x="540" y="30" font-size="19" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Mixture-of-Experts: Top-k Routing</text>
  <text x="540" y="51" font-size="12.5" text-anchor="middle" font-weight="normal" font-style="normal" fill="#565d6b">Ch. 14 — sparse activation raises capacity at roughly dense active compute per token</text>
  <rect x="40" y="100" width="130" height="50" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="105" y="118.64" font-size="12" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">token</text><text x="105" y="133.64" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">hidden vector x</text>
  <rect x="230" y="100" width="160" height="60" rx="8" fill="#f2e9f8" stroke="#7b3fb0" stroke-width="1.8"/><text x="310" y="123.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Router</text><text x="310" y="139.36" font-size="10.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">softmax(W_r · x)</text>
  <path d="M170,125 L230,125" fill="none" stroke="#565d6b" stroke-width="2"  marker-end="url(#dg-moe-routing-arrow-gray)" stroke-linecap="round"/>
  <rect x="60" y="260" width="130" height="90" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="125" y="290.75" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Expert 1</text><text x="125" y="306.25" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">FFN</text><text x="125" y="321.75" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">idle this step</text>
  <path d="M310,160 C310,210 125,210 125,260" fill="none" stroke="#565d6b" stroke-width="1.2" stroke-dasharray="7,5" marker-end="url(#dg-moe-routing-arrow-open)" stroke-linecap="round"/>
  <rect x="220" y="260" width="130" height="90" rx="8" fill="#e8f5ec" stroke="#1b7a43" stroke-width="1.8"/><text x="285" y="290.75" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Expert 2</text><text x="285" y="306.25" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">FFN</text><text x="285" y="321.75" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">ACTIVE (top-2)</text>
  <path d="M310,160 C310,210 285,210 285,260" fill="none" stroke="#1b7a43" stroke-width="2.4"  marker-end="url(#dg-moe-routing-arrow-success)" stroke-linecap="round"/>
  <text x="285" y="252" font-size="10" text-anchor="middle" font-weight="700" font-style="normal" fill="#1b7a43">gate=0.62</text>
  <rect x="380" y="260" width="130" height="90" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="445" y="290.75" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Expert 3</text><text x="445" y="306.25" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">FFN</text><text x="445" y="321.75" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">idle this step</text>
  <path d="M310,160 C310,210 445,210 445,260" fill="none" stroke="#565d6b" stroke-width="1.2" stroke-dasharray="7,5" marker-end="url(#dg-moe-routing-arrow-open)" stroke-linecap="round"/>
  <rect x="540" y="260" width="130" height="90" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="605" y="290.75" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Expert 4</text><text x="605" y="306.25" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">FFN</text><text x="605" y="321.75" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">idle this step</text>
  <path d="M310,160 C310,210 605,210 605,260" fill="none" stroke="#565d6b" stroke-width="1.2" stroke-dasharray="7,5" marker-end="url(#dg-moe-routing-arrow-open)" stroke-linecap="round"/>
  <rect x="700" y="260" width="130" height="90" rx="8" fill="#e8f5ec" stroke="#1b7a43" stroke-width="1.8"/><text x="765" y="290.75" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Expert 5</text><text x="765" y="306.25" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">FFN</text><text x="765" y="321.75" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">ACTIVE (top-2)</text>
  <path d="M310,160 C310,210 765,210 765,260" fill="none" stroke="#1b7a43" stroke-width="2.4"  marker-end="url(#dg-moe-routing-arrow-success)" stroke-linecap="round"/>
  <text x="765" y="252" font-size="10" text-anchor="middle" font-weight="700" font-style="normal" fill="#1b7a43">gate=0.38</text>
  <rect x="860" y="260" width="130" height="90" rx="8" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.8"/><text x="925" y="290.75" font-size="12.5" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Expert 6</text><text x="925" y="306.25" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">FFN</text><text x="925" y="321.75" font-size="10" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">idle this step</text>
  <path d="M310,160 C310,210 925,210 925,260" fill="none" stroke="#565d6b" stroke-width="1.2" stroke-dasharray="7,5" marker-end="url(#dg-moe-routing-arrow-open)" stroke-linecap="round"/>
  <rect x="60" y="400" width="420" height="90" rx="10" fill="#fbf1de" stroke="#9a6400" stroke-width="1.6"/>
  <text x="76" y="422" font-size="12.5" text-anchor="start" font-weight="700" font-style="normal" fill="#9a6400">⚠ Without a load-balancing loss</text>
  <text x="76" y="440" font-size="10.8" text-anchor="start" fill="#1a1d23"><tspan x="76" dy="0" font-weight="normal">routing can collapse onto a few popular experts;</tspan><tspan x="76" dy="15" font-weight="normal">overloaded experts must drop/delay tokens —</tspan><tspan x="76" dy="15" font-weight="normal">an auxiliary balancing loss keeps usage even.</tspan></text>
  <rect x="560" y="400" width="300" height="90" rx="8" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.8"/><text x="710" y="430.36" font-size="13" text-anchor="middle" font-weight="700" font-style="normal" fill="#1a1d23">Combine</text><text x="710" y="446.36" font-size="10.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">output = Σ_selected gate_i · Expert_i(x)</text><text x="710" y="462.36" font-size="10.5" text-anchor="middle" font-weight="400" font-style="normal" fill="#565d6b">weighted sum of active experts&#x27; outputs</text>
  <path d="M285,350 C285,380 600,380 600,400" fill="none" stroke="#1b7a43" stroke-width="2"  marker-end="url(#dg-moe-routing-arrow-success)" stroke-linecap="round"/>
  <path d="M765,350 C765,380 600,380 600,400" fill="none" stroke="#1b7a43" stroke-width="2"  marker-end="url(#dg-moe-routing-arrow-success)" stroke-linecap="round"/>
  <rect x="920" y="100" width="140" height="130" rx="8" fill="#ffffff" stroke="#9aa2b1" stroke-width="1.3"/>
<text x="934" y="120" font-size="12.5" text-anchor="start" font-weight="700" font-style="normal" fill="#1a1d23">Legend</text>
<rect x="934" y="128" width="26" height="14" rx="3" fill="#e0f2f2" stroke="#0f7d82" stroke-width="1.6"/>
<text x="976" y="140" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">active expert</text>
<rect x="934" y="148" width="26" height="14" rx="3" fill="#f2f3f5" stroke="#6b7280" stroke-width="1.6"/>
<text x="976" y="160" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">idle expert</text>
<path d="M934,176 L968,176" fill="none" stroke="#565d6b" stroke-width="2.0" stroke-dasharray="7,5" marker-end="url(#dg-moe-routing-arrow-open)" stroke-linecap="round"/>
<text x="976" y="180" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">not routed</text>
<rect x="934" y="188" width="26" height="14" rx="3" fill="#fbf1de" stroke="#9a6400" stroke-width="1.6"/>
<text x="976" y="200" font-size="11.5" text-anchor="start" font-weight="normal" font-style="normal" fill="#565d6b">imbalance risk</text>
  </g>
</svg>
